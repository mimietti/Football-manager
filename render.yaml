services:
  - type: web
    name: retro-football-manager
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class geventwebsocket.gunicorn.workers.GeventWebSocketWorker -w 1 app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: retro-fm-db
          property: connectionString

databases:
  - name: retro-fm-db
    databaseName: retro_fm
    plan: free
