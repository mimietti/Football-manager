<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Retro Football Manager</title>
    <link rel="stylesheet" href="/static/css/app.css">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
    <main class="shell">
        <section class="hero">
            <div class="pitch"></div>
            <div id="heroContent" class="hero-content">
                <div>
                    <h1>Football Manager</h1>
                    <p id="credit" class="muted"></p>
                </div>
                <form id="newSeasonForm" class="new-season">
                    <input id="managerName" type="hidden" value="{{ username }}">
                    <button type="submit">Choose Team →</button>
                    <a href="/logout" style="font-size:12px;color:rgba(245,246,232,0.45);text-decoration:none;align-self:center">Sign out</a>
                </form>
            </div>
            <div id="teamPicker" class="team-picker" style="display:none">
                <div class="team-picker-header">
                    <button id="teamPickerBack" type="button" class="team-picker-back">← Back</button>
                    <span id="teamPickerTitle" class="team-picker-title"></span>
                </div>
                <div id="teamPickerList" class="team-picker-divs"></div>
            </div>
        </section>

        <!-- Status bar -->
        <section class="status-bar">
            <span id="statusDivision"></span>
            <span id="statusSeason"></span>
            <span id="statusLeague"></span>
            <span id="statusCup"></span>
            <span id="statusSkill"></span>
        </section>

        <!-- Controls row -->
        <section id="setupControls" class="controls">
            <div class="panel">
                <h2>Engine</h2>
                <div class="button-row">
                    <button data-mode="retro">Retro</button>
                    <button data-mode="modern">Modern</button>
                </div>
            </div>
            <div class="panel">
                <h2>Skill Level</h2>
                <select id="skillLevel">
                    <option value="1">1 — Beginner</option>
                    <option value="2">2 — Novice</option>
                    <option value="3">3 — Average</option>
                    <option value="4">4 — Good</option>
                    <option value="5">5 — Expert</option>
                    <option value="6">6 — Super Expert</option>
                    <option value="7">7 — Genius</option>
                </select>
            </div>
            <div class="panel">
                <h2>Next Match</h2>
                <div id="nextFixture" class="next-fixture"></div>
            </div>
        </section>

        <!-- Pre-match comparison -->
        <section id="preMatchPanel" class="pre-match-panel" style="display:none">
            <h2>Pre-Match</h2>
            <div id="preMatchContent"></div>
            <div class="match-panel pre-match-actions">
                <div id="roundLabel" class="round-label"></div>
                <div class="button-row">
                    <button id="editSquad" type="button" style="display:none">Edit squad</button>
                    <button id="playRound">Play</button>
                    <button id="endSeason" style="display:none">New Season</button>
                </div>
            </div>
        </section>

        <!-- Match visualisation -->
        <section id="matchVisual" class="match-visual" style="display:none">
            <div class="scoreboard-still">
                <canvas id="pitchCanvas" class="pitch-canvas"></canvas>
                <div id="visualFixture" class="visual-fixture"></div>
            </div>
        </section>

        <!-- Match report -->
        <section id="reportLayout" class="layout" style="display:none">
            <div id="reportPanel" class="panel">
                <h2>Match Report</h2>
                <div id="latestMatch" class="latest-match">Awaiting kick-off.</div>
                <div id="otherMatches"></div>
                <button id="closeReport" class="close-report" type="button" style="display:none">Close report</button>
            </div>
            <div id="tablePanel" class="panel">
                <h2>Division <span id="tableDiv"></span> Table</h2>
                <table id="leagueTable"></table>
            </div>
        </section>

        <!-- Squad management -->
        <section id="managementLayout" class="layout management-layout" style="display:none">
            <div class="panel">
                <div id="transferPanel" class="transfer-inline" style="display:none">
                    <h2>Transfer Window</h2>
                    <div id="transferMarket" class="player-list"></div>
                </div>
                <div class="panel-title-row">
                    <h2>Squad — <span id="squadTeamName"></span></h2>
                    <button id="renameTeamButton" class="title-action" type="button">Rename Club</button>
                </div>
                <div id="teamSummary" class="team-summary"></div>
                <div class="finance-actions">
                    <input id="loanAmount" type="number" min="1000" step="1000" value="10000" placeholder="£ amount">
                    <button id="borrowButton">Loan</button>
                    <button id="repayButton">Repay</button>
                </div>
                <div class="management-actions">
                    <button id="continueToMatch" type="button">Continue to match</button>
                </div>
                <div id="squadList" class="player-list squad-grid"></div>
            </div>
        </section>
    </main>

    <script>
        const socket = io();
        let state = null;
        let waitingForMatch = false;
        let animating = false;
        let uiPhase = "pre";
        const localSaveKey = "rfm-save:" + {{ username|tojson }};
        let playResponseTimer = null;
        let pendingLineupIn = null;

        const esc = (v) => String(v ?? "")
            .replaceAll("&", "&amp;").replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;").replaceAll('"', "&quot;");

        const fmt = (n) => `£${Number(n).toLocaleString()}`;

        const delay = (ms) => new Promise(r => setTimeout(r, ms));

        function inferPhase(payload) {
            if (payload?.transfer_window && payload?.last_matches?.length) return "report";
            return "pre";
        }

        function saveLocalState(payload) {
            if (!payload?.save_blob) return;
            try {
                localStorage.setItem(localSaveKey, payload.save_blob);
            } catch (err) {
                console.warn("Local save failed", err);
            }
        }

        function restoreLocalState() {
            let saveBlob = "";
            try {
                saveBlob = localStorage.getItem(localSaveKey) || "";
            } catch (err) {
                console.warn("Local save unavailable", err);
            }
            if (saveBlob) {
                socket.emit("restore_save", { save_blob: saveBlob });
            }
        }

        function getLocalSaveBlob() {
            try {
                return localStorage.getItem(localSaveKey) || "";
            } catch (err) {
                return "";
            }
        }

        function clearPlayWait() {
            waitingForMatch = false;
            if (playResponseTimer) {
                clearTimeout(playResponseTimer);
                playResponseTimer = null;
            }
            const playButton = document.getElementById("playRound");
            playButton.textContent = "Play";
            playButton.disabled = state?.season_over ?? false;
        }

        function applyUiPhase() {
            if (!state) return;
            const phase = uiPhase;
            document.getElementById("setupControls").style.display = phase === "pre" ? "" : "none";
            document.getElementById("preMatchPanel").style.display = phase === "pre" ? "" : "none";
            document.getElementById("matchVisual").style.display = phase === "playing" ? "" : "none";
            document.getElementById("reportLayout").style.display =
                (phase === "playing" || phase === "report") ? "" : "none";
            document.getElementById("reportLayout").classList.toggle("live-report", phase === "playing");
            document.getElementById("tablePanel").style.display = phase === "report" ? "" : "none";
            document.getElementById("closeReport").style.display =
                (phase === "report" && state.transfer_window) ? "inline-flex" : "none";
            document.getElementById("managementLayout").style.display = phase === "management" ? "" : "none";
        }

        function reportLine(line) {
            const l = String(line ?? "");
            if (l.startsWith("GOAL")) return `<li class="event-goal">${esc(l)}</li>`;
            if (l.includes("intercepts") || l.includes("is saved")) return `<li class="event-save">${esc(l)}</li>`;
            if (l.includes("shoots wide") || l.includes("shoot wide")) return `<li class="event-wide">${esc(l)}</li>`;
            return `<li>${esc(l)}</li>`;
        }

        function reportLineClass(line) {
            const l = String(line ?? "");
            if (l.startsWith("GOAL")) return "event-goal";
            if (l.includes("intercepts") || l.includes("is saved")) return "event-save";
            if (l.includes("shoots wide") || l.includes("shoot wide")) return "event-wide";
            return "";
        }

        function renderPreMatch() {
            const pm = state?.pre_match;
            const panel = document.getElementById("preMatchPanel");
            if (state?.season_over) {
                document.getElementById("preMatchContent").innerHTML = "<p>Season complete.</p>";
                return;
            }
            if (!pm) { panel.style.display = "none"; return; }
            const humanName = state.human_teams?.[0]?.name ?? "";
            const rows = [
                ["Energy",   pm.human.energy,   pm.ai.energy],
                ["Morale",   pm.human.morale,   pm.ai.morale],
                ["Defence",  pm.human.defence,  pm.ai.defence],
                ["Midfield", pm.human.midfield, pm.ai.midfield],
                ["Attack",   pm.human.attack,   pm.ai.attack],
            ];
            document.getElementById("preMatchContent").innerHTML = `
                <table class="prematch-table">
                    <thead><tr>
                        <th></th>
                        <th class="pm-human">${esc(humanName)}</th>
                        <th class="pm-ai">${esc(pm.opponent)}</th>
                    </tr></thead>
                    <tbody>${rows.map(([label, h, a]) => `
                        <tr>
                            <td class="pm-label">${label}</td>
                            <td class="pm-human ${h > a ? "pm-stronger" : h < a ? "pm-weaker" : ""}">${h}</td>
                            <td class="pm-ai ${a > h ? "pm-stronger" : a < h ? "pm-weaker" : ""}">${a}</td>
                        </tr>`).join("")}
                    </tbody>
                </table>
                <div class="pm-picked"><span>PLAYERS PICKED=${pm.human.lineup_size}</span></div>`;
        }

        function renderOtherMatches(matches, division) {
            const el = document.getElementById("otherMatches");
            if (!matches || !matches.length) { el.innerHTML = ""; return; }
            const rows = matches.map(m => {
                const homeWin = m.home_goals > m.away_goals;
                const awayWin = m.away_goals > m.home_goals;
                const draw = m.home_goals === m.away_goals;
                const hc = homeWin ? "om-win" : draw ? "om-draw" : "om-lose";
                const ac = awayWin ? "om-win" : draw ? "om-draw" : "om-lose";
                return `<tr>
                    <td class="${hc}">${esc(m.home)}</td>
                    <td class="om-score">${m.home_goals} – ${m.away_goals}</td>
                    <td class="${ac}">${esc(m.away)}</td>
                </tr>`;
            }).join("");
            el.innerHTML = `
                <h3 class="other-matches-title">Other Matches — Division ${division}</h3>
                <table class="other-matches-table"><tbody>${rows}</tbody></table>`;
        }

        function isFinanceLine(l) {
            return l.startsWith("Gate receipts") || l.startsWith("Weekly costs");
        }

        function financeHtml(lines) {
            if (!lines.length) return "";
            let html = '<div class="match-finance">';
            lines.forEach(f => {
                if (f.startsWith("Weekly costs")) {
                    html += `<h4>Weekly costs</h4><p>${esc(f.replace(/^Weekly costs\s*[—\-]+\s*/, ""))}</p>`;
                } else {
                    html += `<p>${esc(f)}</p>`;
                }
            });
            html = html.replace("<h4>Weekly costs</h4>", "<h4>****Weekly Bills****</h4>");
            return html + "</div>";
        }

        // Lines skipped during animation — filler with no match value
        function isBoringLine(l) {
            return l.endsWith(" defend.") || l.startsWith("Midfield battle");
        }

        async function animateMatchReport(matches) {
            const container = document.getElementById("latestMatch");
            container.innerHTML = "";

            for (const m of matches) {
                let curHome = 0, curAway = 0;
                const humanName = (state.human_teams || [])[0]?.name ?? "";
                const humanIsHome = m.home === humanName;
                const viz = ensureViz();
                viz.reset(m.home, m.away);

                const article = document.createElement("article");
                article.className = "report";
                container.appendChild(article);

                const scoreEl = document.createElement("div");
                scoreEl.className = "score";
                scoreEl.textContent = `${m.home} 0 – 0 ${m.away}`;
                article.appendChild(scoreEl);

                const ul = document.createElement("ul");
                article.appendChild(ul);

                const financeLines = [];

                for (const line of m.report) {
                    const l = String(line ?? "");

                    if (isFinanceLine(l)) { financeLines.push(l); continue; }
                    if (isBoringLine(l)) continue;

                    const isFinal  = l.startsWith("Final score:");
                    const isGoal   = l.startsWith("GOAL");
                    const isMiss   = l.includes(" shoots wide") || l.includes(" shoot wide");
                    const isSaved  = l.includes(" is saved");
                    const isIntercept = l.includes(" intercepts");
                    const prevHome = curHome, prevAway = curAway;

                    if (isGoal) {
                        const sg = l.match(/\((\d+)[–\-](\d+)\)/);
                        if (sg) {
                            curHome = parseInt(sg[1]);
                            curAway = parseInt(sg[2]);
                            scoreEl.textContent = `${m.home} ${curHome} – ${curAway} ${m.away}`;
                        }
                        const humanScored = humanIsHome ? curHome > prevHome : curAway > prevAway;
                        viz.setScore(curHome, curAway);
                        viz.goal(humanScored);
                    } else if (isMiss) {
                        // Attacker name precedes "shoots wide"
                        const humanMissed = humanName && l.startsWith(humanName);
                        viz.setState(humanMissed ? "attack-human" : "attack-ai");
                        viz.noGoal(humanMissed);
                    } else if (isSaved) {
                        // "X is saved" → X was the attacker
                        const humanAttacking = humanName && l.startsWith(humanName);
                        viz.setState(humanAttacking ? "attack-human" : "attack-ai");
                        viz.saved(humanAttacking);
                    } else if (isIntercept) {
                        // "Y intercepts" → Y is the defender, so other team was attacking
                        const humanDefends = humanName && l.startsWith(humanName);
                        viz.setState(humanDefends ? "attack-ai" : "attack-human");
                        viz.saved(humanDefends);
                    } else if (isFinal) {
                        curHome = m.home_goals;
                        curAway = m.away_goals;
                        scoreEl.textContent = `${m.home} ${curHome} – ${curAway} ${m.away}`;
                        viz.setState("full-time");
                        viz.clearBanner();
                        await delay(600);
                    } else {
                        // Pressure / pressure lines begin with the attacking team name
                        const humanAttacking = humanName && l.startsWith(humanName);
                        viz.setState(humanAttacking ? "attack-human" : "attack-ai");
                    }

                    if (l.startsWith("Highlights:")) {
                        l.replace(/^Highlights:\s*/, "").replace(/\.$/, "").split(", ").forEach(part => {
                            const sp = part.lastIndexOf(" ");
                            const name = part.substring(0, sp);
                            const gn = parseInt(part.substring(sp + 1));
                            if (!isNaN(gn)) {
                                if (name === m.home) curHome = gn;
                                else if (name === m.away) curAway = gn;
                            }
                        });
                        scoreEl.textContent = `${m.home} ${curHome} – ${curAway} ${m.away}`;
                    }

                    const li = document.createElement("li");
                    const cls = reportLineClass(l);
                    if (cls) li.className = cls;
                    li.textContent = l;
                    ul.appendChild(li);
                    li.scrollIntoView({ behavior: "smooth", block: "nearest" });

                    await delay(isGoal ? 1800 : isMiss || isSaved || isIntercept ? 1400 : isFinal ? 900 : 900);
                }

                if (financeLines.length) {
                    article.insertAdjacentHTML("beforeend", financeHtml(financeLines));
                }
            }

            document.getElementById("playRound").disabled = state?.season_over ?? false;
        }

        // ── Canvas pitch visualiser ───────────────────────────────────────────
        class MatchVisualizer {
            constructor(id) {
                this.cv = document.getElementById(id);
                if (!this.cv) return;
                this.g = this.cv.getContext("2d");
                this.W = 640; this.H = 288;
                this.cv.width = this.W; this.cv.height = this.H;
                this.homeTeam = ""; this.awayTeam = "";
                this.hg = 0; this.ag = 0;
                this.phase = 0;
                this.goalTick = 0; this.goalHuman = true;
                // Players: 2 home (white), 4 away (black)
                this.pl = [
                    {x:.12,y:.78,tx:.12,ty:.78,h:true},  // home GK area
                    {x:.40,y:.48,tx:.40,ty:.48,h:true},  // home mid
                    {x:.60,y:.30,tx:.60,ty:.30,h:false},
                    {x:.67,y:.50,tx:.67,ty:.50,h:false},
                    {x:.62,y:.68,tx:.62,ty:.68,h:false},
                    {x:.74,y:.42,tx:.74,ty:.42,h:false},
                ];
                this.bx=.5; this.by=.5; this.btx=.5; this.bty=.5;
                this.bannType = null; this.bannTick = 0; this.bannHuman = true;
                this._raf = null;
                this._loop = this._loop.bind(this);
                this._raf = requestAnimationFrame(this._loop);
            }

            reset(home, away) {
                this.homeTeam = home; this.awayTeam = away;
                this.hg = 0; this.ag = 0;
                this.goalTick = 0; this.bannType = null; this.bannTick = 0;
                this._form("kickoff");
            }

            setScore(h, a) { this.hg = h; this.ag = a; }

            goal(humanScored) {
                this.goalHuman = humanScored;
                this.goalTick = 108 + Math.floor(Math.random() * 15);
                this.bannType = null; this.bannTick = 0;
                // Ball enters goal at random height (top / middle / bottom)
                const gy = 0.30 + Math.random() * 0.40;
                this.btx = humanScored ? 0.93 + Math.random() * 0.05 : 0.02 + Math.random() * 0.05;
                this.bty = gy;
            }

            noGoal(humanMissed) {
                this.bannType = "nogoal"; this.bannTick = 85 + Math.floor(Math.random() * 15);
                this.bannHuman = humanMissed;
                this.goalTick = 0;
                // 3 variants: wide-top, wide-bottom, over the bar
                const r = Math.random();
                if (r < 0.34) {
                    // Over the bar — ball exits top edge near goal
                    this.btx = humanMissed ? 0.91 + Math.random()*0.06 : 0.03 + Math.random()*0.06;
                    this.bty = 0.02;
                } else if (r < 0.67) {
                    // Wide — exits past side/top corner
                    this.btx = humanMissed ? 0.99 : 0.01;
                    this.bty = 0.06 + Math.random() * 0.12;
                } else {
                    // Wide low — exits bottom corner
                    this.btx = humanMissed ? 0.99 : 0.01;
                    this.bty = 0.82 + Math.random() * 0.14;
                }
            }

            saved(humanAttacking) {
                this.bannType = "saved"; this.bannTick = 75 + Math.floor(Math.random() * 15);
                this.bannHuman = humanAttacking;
                this.goalTick = 0;
                // Rebound varies: straight back, tip over, or to side
                const r = Math.random();
                if (r < 0.40) {
                    // Punched / parried back to centre
                    this.btx = humanAttacking ? 0.68 + Math.random()*0.12 : 0.20 + Math.random()*0.12;
                    this.bty = 0.40 + Math.random() * 0.20;
                } else if (r < 0.70) {
                    // Tipped over bar — ball exits top
                    this.btx = humanAttacking ? 0.90 + Math.random()*0.06 : 0.04 + Math.random()*0.06;
                    this.bty = 0.02;
                } else {
                    // Deflected wide to side
                    this.btx = humanAttacking ? 0.82 + Math.random()*0.10 : 0.08 + Math.random()*0.10;
                    this.bty = 0.10 + Math.random() * 0.70;
                }
            }

            clearBanner() {
                this.bannType = null; this.bannTick = 0; this.goalTick = 0;
            }

            setState(name) { this._form(name); }

            _form(name) {
                const F = {
                    kickoff: [
                        { h:[{tx:.12,ty:.78},{tx:.40,ty:.48}], a:[{tx:.60,ty:.30},{tx:.67,ty:.50},{tx:.62,ty:.68},{tx:.74,ty:.42}], b:{tx:.50,ty:.50} },
                    ],
                    "attack-human": [
                        { h:[{tx:.58,ty:.48},{tx:.70,ty:.40}], a:[{tx:.50,ty:.30},{tx:.52,ty:.54},{tx:.48,ty:.70},{tx:.56,ty:.40}], b:{tx:.80,ty:.46} },
                        { h:[{tx:.62,ty:.44},{tx:.76,ty:.55}], a:[{tx:.46,ty:.26},{tx:.54,ty:.58},{tx:.50,ty:.72},{tx:.60,ty:.36}], b:{tx:.84,ty:.52} },
                        { h:[{tx:.55,ty:.53},{tx:.68,ty:.38}], a:[{tx:.48,ty:.34},{tx:.56,ty:.50},{tx:.44,ty:.66},{tx:.62,ty:.44}], b:{tx:.78,ty:.40} },
                    ],
                    "attack-ai": [
                        { h:[{tx:.22,ty:.55},{tx:.32,ty:.46}], a:[{tx:.40,ty:.28},{tx:.48,ty:.52},{tx:.42,ty:.70},{tx:.56,ty:.40}], b:{tx:.34,ty:.55} },
                        { h:[{tx:.18,ty:.60},{tx:.28,ty:.44}], a:[{tx:.38,ty:.24},{tx:.50,ty:.56},{tx:.40,ty:.74},{tx:.54,ty:.36}], b:{tx:.30,ty:.48} },
                        { h:[{tx:.24,ty:.50},{tx:.36,ty:.58}], a:[{tx:.42,ty:.32},{tx:.46,ty:.50},{tx:.44,ty:.68},{tx:.58,ty:.42}], b:{tx:.36,ty:.60} },
                    ],
                    "full-time": [
                        { h:[{tx:.42,ty:.52},{tx:.55,ty:.46}], a:[{tx:.52,ty:.38},{tx:.60,ty:.54},{tx:.54,ty:.68},{tx:.62,ty:.44}], b:{tx:.50,ty:.50} },
                    ],
                };
                const arr = F[name] || F["kickoff"];
                const f = arr[Math.floor(Math.random() * arr.length)];
                f.h.forEach((p,i) => { if(this.pl[i]){this.pl[i].tx=p.tx;this.pl[i].ty=p.ty;} });
                f.a.forEach((p,i) => { if(this.pl[2+i]){this.pl[2+i].tx=p.tx;this.pl[2+i].ty=p.ty;} });
                this.btx = f.b.tx; this.bty = f.b.ty;
            }

            _loop(t) {
                this._raf = requestAnimationFrame(this._loop);
                this.phase = (t * 0.003) % (Math.PI * 2);
                const sp = 0.07;
                for (const p of this.pl) { p.x += (p.tx-p.x)*sp; p.y += (p.ty-p.y)*sp; }
                this.bx += (this.btx-this.bx)*0.13; this.by += (this.bty-this.by)*0.13;
                if (this.goalTick > 0) this.goalTick--;
                if (this.bannTick > 0) this.bannTick--;
                this._draw();
            }

            _px(nx) { return 42 + nx * 556; }
            _py(ny) { return 16 + ny * 256; }

            _draw() {
                const {g,W,H} = this;
                // Pitch stripes
                for (let i=0;i<8;i++) {
                    g.fillStyle = i%2===0 ? "#19d934" : "#17c830";
                    g.fillRect(42+i*69.5, 0, 70, H);
                }
                g.fillStyle="#19d934"; g.fillRect(0,0,42,H); g.fillRect(598,0,42,H);

                // Lines
                g.strokeStyle="#fff065"; g.lineWidth=2.2;
                // Outer
                g.strokeRect(this._px(0),this._py(0),this._px(1)-this._px(0),this._py(1)-this._py(0));
                // Centre line
                g.beginPath(); g.moveTo(this._px(.5),this._py(0)); g.lineTo(this._px(.5),this._py(1)); g.stroke();
                // Centre circle
                g.beginPath(); g.ellipse(this._px(.5),this._py(.5),73,58,0,0,Math.PI*2); g.stroke();
                // Right penalty box
                g.strokeRect(this._px(.72),this._py(.18),this._px(1)-this._px(.72),this._py(.82)-this._py(.18));
                // Right goal box
                g.strokeRect(this._px(.88),this._py(.31),this._px(1)-this._px(.88),this._py(.69)-this._py(.31));
                // Left penalty box
                g.strokeRect(this._px(0),this._py(.18),this._px(.28)-this._px(0),this._py(.82)-this._py(.18));
                // Left goal box
                g.strokeRect(this._px(0),this._py(.31),this._px(.12)-this._px(0),this._py(.69)-this._py(.31));

                // Ball
                g.fillStyle="#1a44e0";
                g.beginPath(); g.arc(this._px(this.bx),this._py(this.by),5.5,0,Math.PI*2); g.fill();

                // Players
                for (const p of this.pl) {
                    const moving = (Math.abs(p.x-p.tx)+Math.abs(p.y-p.ty))>0.018;
                    this._fig(this._px(p.x), this._py(p.y), p.h, moving);
                }

                // Event banners
                if (this.goalTick > 0) this._goalBanner(W, H, Math.min(1, this.goalTick/8));
                else if (this.bannTick > 0) this._simBanner(W, H, Math.min(1, this.bannTick/8));
            }

            _fig(x, y, isHome, run) {
                const g=this.g, c=isHome?"#f7f4e9":"#0d0d0d", s=21, ph=this.phase;
                g.strokeStyle=c; g.fillStyle=c; g.lineWidth=2;
                // Head
                g.beginPath(); g.arc(x, y-s*.55, s*.20, 0, Math.PI*2); g.fill();
                // Body
                g.beginPath(); g.moveTo(x,y-s*.35); g.lineTo(x,y+s*.08); g.stroke();
                // Arms
                const sw = run ? Math.sin(ph*3)*.22 : 0;
                g.beginPath(); g.moveTo(x-s*(.36+sw),y-s*.20); g.lineTo(x+s*(.36-sw),y-s*.20); g.stroke();
                // Legs
                const lw = run ? Math.sin(ph*3)*.38 : 0;
                g.beginPath(); g.moveTo(x,y+s*.08); g.lineTo(x-s*(.30+lw),y+s*.46); g.stroke();
                g.beginPath(); g.moveTo(x,y+s*.08); g.lineTo(x+s*(.30-lw),y+s*.46); g.stroke();
            }

            _simBanner(W, H, alpha) {
                const g = this.g;
                const isNoGoal = this.bannType === "nogoal";
                const text = isNoGoal ? "NO GOAL!" : "SAVED!";
                g.globalAlpha = alpha;
                const bH = 46, bW = 280, bX = (W - bW) / 2, bY = 10;
                g.fillStyle = "#f7f4e9";
                g.fillRect(bX, bY, bW, bH);
                g.strokeStyle = "#111111"; g.lineWidth = 3;
                g.strokeRect(bX, bY, bW, bH);
                g.fillStyle = "#111111";
                g.font = `bold 26px "Courier New"`;
                g.textAlign = "center"; g.textBaseline = "middle";
                g.fillText(text, W / 2, bY + bH / 2);
                g.globalAlpha = 1;
            }

            _goalBanner(W, H, alpha) {
                const g=this.g, bH=H*.40;
                g.globalAlpha = alpha;
                // Red bg
                g.fillStyle="#bb1111"; g.fillRect(0,0,W,bH);
                // Star grid
                g.fillStyle="#f7f15b";
                for (let col=0;col<W;col+=22) for (let row=4;row<bH*.62;row+=15)
                    if (((col/22|0)+(row/15|0))%2===0) g.fillRect(col+4,row+2,7,7);
                // GOAL! text
                g.font=`bold ${Math.floor(bH*.58)}px "Courier New"`;
                g.textAlign="center"; g.textBaseline="middle";
                g.fillText("GOAL!", W/2, bH*.44);
                // Score bar
                g.fillStyle="#f7f4e9"; g.fillRect(0,bH,W,bH*.30);
                const sf=Math.floor(bH*.24);
                g.font=`bold ${sf}px "Courier New"`;
                const sy=bH*1.15;
                g.textAlign="left";
                g.fillStyle=this.goalHuman?"#1748c7":"#bb1111";
                g.fillText(this.homeTeam,10,sy);
                g.fillStyle="#111"; g.textAlign="center";
                g.fillText(String(this.hg),W*.42,sy);
                g.fillStyle=this.goalHuman?"#bb1111":"#1748c7";
                g.textAlign="left"; g.fillText(this.awayTeam,W*.50,sy);
                g.fillStyle="#111"; g.textAlign="right";
                g.fillText(String(this.ag),W-10,sy);
                g.globalAlpha=1;
            }

            destroy() { if(this._raf){cancelAnimationFrame(this._raf);this._raf=null;} }
        }

        let matchViz = null;
        // Defer init until DOM is ready (canvas element may not exist yet if no game)
        function ensureViz() {
            if (!matchViz || !matchViz.cv) matchViz = new MatchVisualizer("pitchCanvas");
            return matchViz;
        }

        function render() {
            if (!state) return;
            const hasActiveGame = (state.human_teams || []).length > 0;
            document.getElementById("heroContent").style.display = "";
            document.getElementById("newSeasonForm").style.display = hasActiveGame ? "none" : "";
            if (hasActiveGame) {
                document.getElementById("teamPicker").style.display = "none";
            }

            // Status bar
            document.getElementById("statusDivision").textContent =
                `Division ${state.division}`;
            document.getElementById("statusSeason").textContent =
                `Season ${state.season_number}`;
            document.getElementById("statusLeague").textContent =
                `Match ${state.league_match}/${state.total_league_matches}`;
            const cupText = state.cup_eliminated
                ? "Cup: Eliminated"
                : state.cup_round > 0
                    ? `Cup: Round ${state.cup_round}`
                    : "Cup: Not started";
            document.getElementById("statusCup").textContent = cupText;
            document.getElementById("statusSkill").textContent =
                `Level ${state.skill_level} — ${esc(state.skill_name)}`;

            document.getElementById("credit").textContent = state.inspiration;
            document.getElementById("skillLevel").value = String(state.skill_level || 1);
            document.querySelectorAll("[data-mode]").forEach(
                b => b.classList.toggle("active", b.dataset.mode === state.mode)
            );

            // Next fixture
            const nf = state.next_fixture || {};
            let nfText = "";
            if (state.season_over) {
                nfText = "<em>Season complete!</em>";
            } else if (nf.type === "cup") {
                nfText = `<strong>FA Cup Round ${nf.cup_round}</strong><br>vs ${esc(nf.opponent)}`;
            } else if (nf.type === "league") {
                nfText = `<strong>League Match ${nf.league_match}</strong><br>vs ${esc(nf.opponent)}`;
            }
            document.getElementById("nextFixture").innerHTML = nfText;
            document.getElementById("visualFixture").textContent = nfText.replace(/<[^>]*>/g, " ");
            const visualScore = document.getElementById("visualScore");
            if (visualScore && nf?.opponent) {
                const humanName = state.human_teams?.[0]?.name ?? "";
                visualScore.textContent = `${humanName} 0 - 0 ${nf.opponent}`;
            }
            const visualBanner = document.getElementById("visualBanner");
            if (visualBanner && !animating) visualBanner.textContent = "KICK OFF";

            // Round label
            document.getElementById("roundLabel").textContent = state.season_over
                ? "Season complete — advance to next season?"
                : `Division ${state.division} · Match ${state.league_match + 1}`;

            // Play / end-season buttons
            document.getElementById("playRound").disabled = state.season_over || waitingForMatch;
            document.getElementById("endSeason").style.display =
                state.season_over ? "inline-flex" : "none";
            document.getElementById("editSquad").style.display =
                (!state.season_over && state.transfer_window) ? "inline-flex" : "none";

            // League table
            document.getElementById("tableDiv").textContent = state.division;
            const tbody = (state.table || []).map((row, i) => `
                <tr class="${row.is_human ? "player" : ""}">
                    <td>${i + 1}</td>
                    <td>${esc(row.name)}</td>
                    <td>${row.gf}</td>
                    <td>${row.ga}</td>
                    <td>${row.gd >= 0 ? "+" : ""}${row.gd}</td>
                    <td><strong>${row.pts}</strong></td>
                </tr>`).join("");
            document.getElementById("leagueTable").innerHTML = `
                <thead>
                  <tr><th>#</th><th>Club</th><th>F</th><th>A</th><th>GD</th><th>Pts</th></tr>
                </thead>
                <tbody>${tbody}</tbody>`;

            // Match report — skip during animation (animateMatchReport handles live updates)
            if (!animating) {
                const reports = state.last_matches || [];
                document.getElementById("latestMatch").innerHTML = reports.length
                    ? reports.map(m => {
                        const events = m.report.filter(l => !isFinanceLine(l) && !isBoringLine(l));
                        const finances = m.report.filter(l => isFinanceLine(l));
                        return `
                        <article class="report">
                            <div class="score">${esc(m.home)} ${m.home_goals} – ${m.away_goals} ${esc(m.away)}</div>
                            <ul>${events.map(reportLine).join("")}</ul>
                            ${financeHtml(finances)}
                        </article>`;
                    }).join("")
                    : "Awaiting kick-off.";
            }

            // Other matches (only when not mid-animation)
            if (!animating && uiPhase === "report") {
                renderOtherMatches(state.other_matches || [], state.division);
            } else if (uiPhase !== "report") {
                document.getElementById("otherMatches").innerHTML = "";
            }

            renderPreMatch();

            // Squad panel
            const human = (state.human_teams || [])[0];
            if (human) {
                document.getElementById("squadTeamName").textContent = human.name;
                renderTeamSummary(human);
                const sortedSquad = [...(human.squad || [])].sort((a, b) => {
                    const order = { D: 0, M: 1, A: 2 };
                    return (order[a.position] ?? 9) - (order[b.position] ?? 9) ||
                        String(a.name).localeCompare(String(b.name));
                });
                const groups = [
                    ["D", "Defenders"],
                    ["M", "Midfielders"],
                    ["A", "Attackers"],
                ];
                document.getElementById("squadList").innerHTML =
                    groups.map(([pos, label]) => `
                        <section class="squad-column">
                            <h3>${label}</h3>
                            <div class="squad-table-head">
                                <span>Name</span>
                                <span>Sk</span>
                                <span>En</span>
                                <span>Value</span>
                                <span></span>
                            </div>
                            <div class="player-list">
                                ${sortedSquad.filter(p => p.position === pos).map(p => playerRow(p, human.name, true)).join("")}
                            </div>
                        </section>
                    `).join("");
            }

            // Transfer market — only visible after a match
            const transferPanel = document.getElementById("transferPanel");
            transferPanel.style.display = state.transfer_window ? "" : "none";
            if (state.transfer_window) {
                document.getElementById("transferMarket").innerHTML =
                    (state.transfer_market || []).length
                        ? (state.transfer_market || []).map(p => playerRow(p, human?.name || "", false)).join("")
                        : '<p class="muted small">No player available.</p>';
            }

            applyUiPhase();
        }

        function renderTeamSummary(team) {
            const d2 = team.div_multiplier || 1;
            document.getElementById("teamSummary").innerHTML = `
                <div>Cash: ${fmt(team.cash)}</div>
                <div>Loan: ${fmt(team.loan)}</div>
                <div>Gate money: ${fmt(team.gate_money)}</div>
                <div>Wages/wk: ${fmt(team.wage_bill)}</div>
                <div>Rent/wk: ${fmt(team.ground_rent)}</div>
                <div>Interest/wk: ${fmt(team.loan_interest)}</div>
                <div>Loan limit: ${fmt(team.loan_limit)}</div>
                <div>Squad: ${team.squad_size}/${team.max_squad_size}</div>
                <div>Morale: ${team.retro_morale}/20</div>
                <div>Lineup: ${team.lineup_size}/11</div>
            `;
        }

        function posLabel(pos) {
            return pos === "D" ? "DEF" : pos === "M" ? "MID" : "ATK";
        }

        function posClass(pos) {
            return pos === "D" ? "pos-d" : pos === "M" ? "pos-m" : "pos-a";
        }

        function energyClass(energy) {
            if (energy >= 15) return "energy-high";
            if (energy >= 8) return "energy-mid";
            return "energy-low";
        }

        function legacyPlayerRow(player, teamName, owned) {
            const inj = player.injured ? ` <em class="inj">INJ</em>` : "";
            const moraleStr = player.morale != null ? `Morale ${player.morale}/20 · ` : "";
            const statLine = `${posLabel(player.position)} · Skill ${player.skill}`;
            const energyHtml = `<em class="energy-value ${energyClass(player.energy)}">${player.energy}/20</em>`;
            const statLine2 = `${moraleStr}Value ${fmt(player.value)}`;
            const pc = posClass(player.position);
            if (owned) {
                const sellDisabled = player.injured || state?.transfer_sold_this_window ? "disabled" : "";
                let lineupLabel = player.active ? "▶ Playing" : "— Bench";
                let lineupClass = player.active ? "btn-playing" : "btn-bench";
                if (pendingLineupIn) {
                    if (player.id === pendingLineupIn.id) {
                        lineupLabel = "Selected";
                        lineupClass = "btn-swap";
                    } else if (player.active) {
                        lineupLabel = `Bench for ${pendingLineupIn.name}`;
                        lineupClass = "btn-swap";
                    }
                }
                return `
                <div class="player-row ${player.active ? "active-player" : ""} ${player.injured ? "injured-player" : ""}">
                    <div>
                        <strong class="${pc}">${esc(player.name)}${inj}</strong>
                        <span>${esc(statLine)} · ${energyHtml}</span>
                        <span>${esc(statLine2)}</span>
                    </div>
                    <div class="player-actions">
                        <button data-lineup="${esc(player.id)}" data-team="${esc(teamName)}"
                            class="${lineupClass}"
                            ${player.injured ? "disabled" : ""}>${esc(lineupLabel)}</button>
                        <button data-rename-player="${esc(player.id)}" data-team="${esc(teamName)}">Rename</button>
                        <button data-sell="${esc(player.id)}" data-team="${esc(teamName)}"
                            ${sellDisabled}>Sell</button>
                    </div>
                </div>`;
            } else {
                const buyDisabled = state?.transfer_bought_this_window ? "disabled" : "";
                return `
                <div class="player-row">
                    <div>
                        <strong class="${pc}">${esc(player.name)}</strong>
                        <span>${esc(statLine)} · ${energyHtml}</span>
                        <span>${esc(statLine2)}</span>
                    </div>
                    <div class="player-actions">
                        <button data-buy="${esc(player.id)}" data-team="${esc(teamName)}" ${buyDisabled}>
                            Sign ${fmt(player.value)}
                        </button>
                    </div>
                </div>`;
            }
        }

        function playerRow(player, teamName, owned) {
            const inj = player.injured ? ` <em class="inj">INJ</em>` : "";
            const pc = posClass(player.position);
            const energyHtml = `<em class="energy-value ${energyClass(player.energy)}">${player.energy}/20</em>`;
            if (owned) {
                const sellDisabled = player.injured || state?.transfer_sold_this_window ? "disabled" : "";
                let lineupLabel = player.active ? "P" : "Bench";
                let lineupClass = player.active ? "btn-playing" : "btn-bench";
                if (pendingLineupIn) {
                    if (player.id === pendingLineupIn.id) {
                        lineupLabel = "Selected";
                        lineupClass = "btn-swap";
                    } else if (player.active) {
                        lineupLabel = `Bench`;
                        lineupClass = "btn-swap";
                    }
                }
                return `
                <div class="player-row ${player.active ? "active-player" : ""} ${player.injured ? "injured-player" : ""}">
                    <strong class="${pc}">${esc(player.name)}${inj}</strong>
                    <span>${player.skill}</span>
                    <span>${energyHtml}</span>
                    <span>${fmt(player.value)}</span>
                    <div class="player-actions">
                        <button data-lineup="${esc(player.id)}" data-team="${esc(teamName)}"
                            class="${lineupClass}" ${player.injured ? "disabled" : ""}>${esc(lineupLabel)}</button>
                        <button data-rename-player="${esc(player.id)}" data-team="${esc(teamName)}">Rename</button>
                        <button data-sell="${esc(player.id)}" data-team="${esc(teamName)}" ${sellDisabled}>Sell</button>
                    </div>
                </div>`;
            }
            const buyDisabled = state?.transfer_bought_this_window ? "disabled" : "";
            return `
            <div class="player-row">
                <strong class="${pc}">${esc(player.name)}</strong>
                <span>${player.skill}</span>
                <span>${energyHtml}</span>
                <span>${fmt(player.value)}</span>
                <div class="player-actions">
                    <button data-buy="${esc(player.id)}" data-team="${esc(teamName)}" ${buyDisabled}>
                        Sign ${fmt(player.value)}
                    </button>
                </div>
            </div>`;
        }

        const ALL_TEAM_NAMES = [
            "Arsenal","Aston V.","Brighton","Coventry","Everton","Ipswich",
            "Liverpool","Luton","Man.City","Man.Utd","Norwich","Notts.F.",
            "Swansea","Spurs","Watford","West Ham",
            "Blackburn","Bolton","Cambridge","Charlton","Chelsea","Crystal P.",
            "Derby Co.","Fulham","Grimsby","Leeds","Middlesbro","Newcastle",
            "Oldham","Q.P.R.","Rotherham","Sheff.Wed",
            "Bradford","Brentford","Bristol R.","Cardiff","Doncaster","Exeter",
            "Lincoln","Millwall","Newport","Orient","Oxford","Plymouth",
            "Preston","Reading","Southend","Walsall",
            "Blackpool","Bury","Colchester","Crewe","Darlington","Halifax",
            "Hartlepool","Hereford","Hull","Mansfield","Port Vale","Rochdale",
            "Scunthorpe","Stockport","Torquay","York City",
        ];

        let pendingManagerName = null;

        function showTeamPicker(managerName) {
            pendingManagerName = managerName;
            document.getElementById("heroContent").style.display = "none";
            document.getElementById("teamPicker").style.display = "";
            document.getElementById("teamPickerTitle").textContent = "Choose a team";
            let html = "";
            for (let div = 1; div <= 4; div++) {
                html += `<div class="team-div-group"><h3>Division ${div}</h3>`;
                for (let i = 0; i < 16; i++) {
                    const idx = (div - 1) * 16 + i;
                    html += `<button class="team-btn" data-team-index="${idx}">${esc(ALL_TEAM_NAMES[idx])}</button>`;
                }
                html += `</div>`;
            }
            document.getElementById("teamPickerList").innerHTML = html;
        }

        // Event listeners
        document.getElementById("newSeasonForm").addEventListener("submit", e => {
            e.preventDefault();
            const name = document.getElementById("managerName").value.trim() || "Manager";
            showTeamPicker(name);
        });

        document.getElementById("teamPickerBack").addEventListener("click", () => {
            document.getElementById("teamPicker").style.display = "none";
            document.getElementById("heroContent").style.display = "";
        });

        document.getElementById("playRound").addEventListener("click", () => {
            waitingForMatch = true;
            const playButton = document.getElementById("playRound");
            playButton.disabled = true;
            playButton.textContent = "Playing...";
            if (playResponseTimer) clearTimeout(playResponseTimer);
            playResponseTimer = setTimeout(() => {
                clearPlayWait();
                uiPhase = inferPhase(state);
                render();
                alert("Match did not start. The local save was restored if available; try Play again.");
            }, 8000);
            socket.emit("play_round", { save_blob: getLocalSaveBlob() });
        });

        document.getElementById("endSeason").addEventListener("click", () =>
            socket.emit("end_season"));

        document.getElementById("editSquad").addEventListener("click", () => {
            uiPhase = "management";
            render();
        });

        document.getElementById("closeReport").addEventListener("click", () => {
            uiPhase = "management";
            render();
        });

        document.getElementById("continueToMatch").addEventListener("click", () => {
            uiPhase = "pre";
            render();
        });

        document.getElementById("skillLevel").addEventListener("change", e =>
            socket.emit("set_skill_level", { level: e.target.value }));

        document.getElementById("borrowButton").addEventListener("click", () => {
            const team = (state?.human_teams?.[0])?.name || "";
            const amount = parseInt(document.getElementById("loanAmount").value, 10);
            socket.emit("borrow", { team, amount });
        });

        document.getElementById("repayButton").addEventListener("click", () => {
            const team = (state?.human_teams?.[0])?.name || "";
            const amount = parseInt(document.getElementById("loanAmount").value, 10);
            socket.emit("repay", { team, amount });
        });

        document.getElementById("renameTeamButton").addEventListener("click", () => {
            const team = (state?.human_teams?.[0])?.name || "";
            const name = prompt("New club name", team);
            if (name) socket.emit("rename_team", { team, name });
        });

        document.querySelectorAll("[data-mode]").forEach(b =>
            b.addEventListener("click", () =>
                socket.emit("set_tactics", { mode: b.dataset.mode })));

        document.addEventListener("click", e => {
            const teamBtn = e.target.closest("[data-team-index]");
            if (teamBtn) {
                const idx = parseInt(teamBtn.dataset.teamIndex, 10);
                document.getElementById("teamPicker").style.display = "none";
                document.getElementById("heroContent").style.display = "";
                try { localStorage.removeItem(localSaveKey); } catch (err) {}
                socket.emit("new_season", { managers: pendingManagerName, team_index: idx });
                return;
            }
            const buy = e.target.closest("[data-buy]");
            if (buy) { socket.emit("buy_player", { team: buy.dataset.team, player_id: buy.dataset.buy }); return; }
            const sell = e.target.closest("[data-sell]");
            if (sell) { socket.emit("sell_player", { team: sell.dataset.team, player_id: sell.dataset.sell }); return; }
            const lineup = e.target.closest("[data-lineup]");
            if (lineup) {
                const human = (state?.human_teams || [])[0];
                const player = (human?.squad || []).find(p => p.id === lineup.dataset.lineup);
                if (!player) return;
                if (pendingLineupIn && player.active) {
                    socket.emit("swap_lineup", {
                        team: lineup.dataset.team,
                        in_player_id: pendingLineupIn.id,
                        out_player_id: player.id,
                    });
                    pendingLineupIn = null;
                    return;
                }
                if (pendingLineupIn && player.id === pendingLineupIn.id) {
                    pendingLineupIn = null;
                    render();
                    return;
                }
                if (!player.active && human?.lineup_size >= 11) {
                    pendingLineupIn = { id: player.id, name: player.name };
                    render();
                    return;
                }
                pendingLineupIn = null;
                socket.emit("toggle_lineup", { team: lineup.dataset.team, player_id: lineup.dataset.lineup });
                return;
            }
            const renameP = e.target.closest("[data-rename-player]");
            if (renameP) {
                const name = prompt("New player name");
                if (name) socket.emit("rename_player", {
                    team: renameP.dataset.team,
                    player_id: renameP.dataset.renamePlayer,
                    name,
                });
            }
        });

        socket.on("connect", () => socket.emit("join", {}));
        socket.on("state_missing", () => restoreLocalState());
        socket.on("state", payload => {
            saveLocalState(payload);
            const wasWaiting = waitingForMatch;
            clearPlayWait();
            pendingLineupIn = null;
            state = payload;
            if (wasWaiting && payload.last_matches?.length > 0) {
                animating = true;
                uiPhase = "playing";
            } else if (!(uiPhase === "management" && payload.transfer_window)) {
                uiPhase = inferPhase(payload);
            }
            render();
            if (wasWaiting && payload.last_matches?.length > 0) {
                applyUiPhase();
                document.getElementById("playRound").disabled = true;
                document.getElementById("otherMatches").innerHTML = "";
                animateMatchReport(payload.last_matches).then(() => {
                    animating = false;
                    uiPhase = "report";
                    render();
                });
            }
        });
        socket.on("action_error", payload => {
            clearPlayWait();
            pendingLineupIn = null;
            uiPhase = inferPhase(state);
            if (state) render();
            alert((payload?.message) || "Action failed.");
        });
    </script>
</body>
