                const eased=1-Math.pow(1-t, 2);
                return {
                    px:this.keeperSave.fromPx+(this.keeperSave.px-this.keeperSave.fromPx)*eased,
                    py:this.keeperSave.fromPy+(this.keeperSave.py-this.keeperSave.fromPy)*eased
                };
            }

            _attackShotArc() {
                if(!this.shotStart || (!this.shotActive && this.shotTraceTick<=0)) return;
                const g=this.g;
                const sx=this.shotStart.px, sy=this.shotStart.py;
                const ex=this.shotActive?this.bpx:this.btpx, ey=this.shotActive?this.bpy:this.btpy;
                const dx=ex-sx, dy=ey-sy;
                g.save();
                g.strokeStyle="#f7f15b";
                g.lineWidth=4;
                g.setLineDash([12,10]);
                g.beginPath();
                for(let i=0;i<=24;i++){
                    const t=i/24;
                    const px=sx+dx*t;
                    const py=sy+dy*t + Math.sin(Math.PI*t)*.035*(dx>=0?-1:1);
                    const p=this._ap(px,py);
                    i?g.lineTo(p.x,p.y):g.moveTo(p.x,p.y);
                }
                g.stroke();
                g.restore();
            }

            _passLine() {
                if(!this.passActive || !this.dribbleTarget || !this.passTarget) return;
                const g=this.g;
                const a=this._ps(this.dribbleTarget.px,this.dribbleTarget.py);
                const b=this._ps(this.bpx,this.bpy);
                g.save();
                g.strokeStyle="#f7f15b";
                g.lineWidth=1.5;
                g.setLineDash([5,4]);
                g.beginPath();
                g.moveTo(a.x,a.y);
                g.lineTo(b.x,b.y);
                g.stroke();
                g.restore();
            }

            _drawAttack() {
                const {g,W,H}=this;
                g.fillStyle="#00bb00"; g.fillRect(0,0,W,H);
                const ai=this._vs==="attack-ai";
                // All coords in pitch space (0..1); _ap() mirrors for AI automatically.
                const gx=ai?0:1, pax=ai?0.25:0.75, sbx=ai?0.12:0.88, psx=ai?0.12:0.88;
                const AP=(px,py)=>this._ap(px,py);
                g.strokeStyle="#ffff00"; g.lineWidth=2.8;
                g.lineJoin="round"; g.lineCap="round";
                // Penalty area
                g.beginPath();
                g.moveTo(...this._apv(pax,0.18)); g.lineTo(...this._apv(gx,0.18));
                g.moveTo(...this._apv(pax,0.82)); g.lineTo(...this._apv(gx,0.82));
                g.moveTo(...this._apv(pax,0.18)); g.lineTo(...this._apv(pax,0.82));
                g.stroke();
                // 6-yard box
                g.beginPath();
                g.moveTo(...this._apv(sbx,0.32)); g.lineTo(...this._apv(gx,0.32));
                g.moveTo(...this._apv(sbx,0.68)); g.lineTo(...this._apv(gx,0.68));
                g.moveTo(...this._apv(sbx,0.32)); g.lineTo(...this._apv(sbx,0.68));
                g.stroke();
                // Penalty spot
                const ps=AP(psx,0.50);
                g.beginPath(); g.arc(ps.x,ps.y,3,0,Math.PI*2); g.fill();
                // Goal: rectangular box using pitch coords so depth stays on-screen
                const netDir=ai?1:-1, netDepth=0.07;
                const gp1=AP(gx,0.36), gp2=AP(gx,0.64);
                const np1=AP(gx+netDir*netDepth,0.36), np2=AP(gx+netDir*netDepth,0.64);
                g.lineWidth=3.2; g.lineCap="round"; g.lineJoin="round";
                g.beginPath();
                g.moveTo(gp1.x,gp1.y); g.lineTo(gp2.x,gp2.y);   // goal mouth (far post line)
                g.moveTo(gp1.x,gp1.y); g.lineTo(np1.x,np1.y);   // upper side post
                g.moveTo(gp2.x,gp2.y); g.lineTo(np2.x,np2.y);   // lower side post
                g.moveTo(np1.x,np1.y); g.lineTo(np2.x,np2.y);   // near side (open end)
                g.stroke();
                // Shot arc and ball
                this._passLine();
                this._attackShotArc();
                if(this.goalTick<=0 && this.goalDelayTick<=0) {
                    const bs=AP(this.bpx,this.bpy);
                    this._ball(bs.x,bs.y,6);
                }
                const kickIdx=this.kickTick>0 ? this.shooterIdx : -1;
                const kickDir=this._vs==="attack-ai"?-1:1;
                const kickPower=this.kickTick>0 ? 1-(this.kickTick/this.kickDuration) : 0;
                for(const p of this.pl){
                    if(!p.active) continue;
                    const s=AP(p.px,p.py);
                    const i=this.pl.indexOf(p);
                    this._fig(
                        s.x,
                        s.y,
                        p.human,
                        (Math.abs(p.px-p.tpx)+Math.abs(p.py-p.tpy))>0.015,
                        i===kickIdx ? kickDir : 0,
                        i===kickIdx ? kickPower : 0
                    );
                }
                if(this.keeperSave && (this.shotActive || this.keeperTick>0)) {
                    const kp=this._keeperSavePoint();
                    const ks=AP(kp.px,kp.py);
                    this._keeper(ks.x,ks.y,this.keeperSave.human);
                }
                this._goalBallInNet();
                this._updateOverlay();
            }

            _draw() {
                const {g,W,H}=this;
                g.fillStyle="#00bb00"; g.fillRect(0,0,W,H);
                g.save();
                this._setView(g);
                g.strokeStyle="#ffff00"; g.lineWidth=1.5;
                const {tl,tr,bl,br}=this.C;
                g.beginPath(); g.moveTo(tl.x,tl.y); g.lineTo(tr.x,tr.y);
                g.lineTo(br.x,br.y); g.lineTo(bl.x,bl.y); g.closePath(); g.stroke();
                this._lp([[.5,0],[.5,1]]);
                this._ell(.5,.5,.087,.135);
                // Penalty areas (16.5m of 105m = 0.157), width 40.32m of 68m (y=0.204–0.796)
                this._lp([[0,.204],[.157,.204],[.157,.796],[0,.796],[0,.204]]);
                // 6-yard boxes (5.5m = 0.052), width 18.32m of 68m (y=0.366–0.634)
                this._lp([[0,.366],[.052,.366],[.052,.634],[0,.634],[0,.366]]);
                this._lp([[1,.204],[.843,.204],[.843,.796],[1,.796],[1,.204]]);
                this._lp([[1,.366],[.948,.366],[.948,.634],[1,.634],[1,.366]]);
                // D arcs: R9.15m centred on penalty spot (11m = 0.105), only outside penalty area
                this._parc(.895,.5,.087,.135,Math.PI*.704,Math.PI*1.296);
                this._parc(.105,.5,.087,.135,-Math.PI*.296,Math.PI*.296);
                this._drawGoal(true); this._drawGoal(false);
                this._shotArc();
                this._passLine();
                const bs=this._ps(this.bpx,this.bpy);
                this._ball(bs.x,bs.y,6);
                this._goalBallInNet();
                for(const p of this.fmPl){
                    const s=this._ps(p.px,p.py);
                    const moving=(Math.abs(p.px-p.tpx)+Math.abs(p.py-p.tpy))>0.015;
                    this._fig(s.x,s.y,p.human,moving,0,0,p.isGK?12:10);
                    if(p.isGK){
                        g.save();
                        g.font="bold 9px monospace";
                        g.textAlign="center";
                        g.textBaseline="bottom";
                        g.fillStyle=p.human?"#ffffff":this.aiColor;
                        g.fillText("G",s.x,s.y-14);
                        g.restore();
                    }
                }
                if(this.keeperSave && (this.shotActive || this.keeperTick>0)) {
                    const ks=this._ps(this.keeperSave.px,this.keeperSave.py);
                    this._keeper(ks.x,ks.y,this.keeperSave.human);
                }
                g.restore();
                this._drawBanner();
                this._drawScoreboard();
                this._updateOverlay();
            }

            _drawScoreboard() {
                if(!this.homeTeam) return;
                const {g,W}=this;
                const mh=68, th=26;
                g.save();
                g.fillStyle="#111111";
                g.fillRect(0,0,W,mh);
                const goalActive=this.goalTick>0;
                g.fillStyle=goalActive?"#990000":"#1c1c1c";
                g.fillRect(0,mh,W,th);
                const cy=mh/2, cx=W/2;
                const short=(n)=>n.length>11?n.substring(0,10)+"…":n;
                // Score — large, centered
                g.textBaseline="middle"; g.textAlign="center";
                g.font="bold 40px monospace"; g.fillStyle="#ffffff";
                g.fillText(String(this.hg),cx-W*0.045,cy+1);
                g.fillText(String(this.ag),cx+W*0.045,cy+1);
                g.font="bold 20px monospace"; g.fillStyle="#555555";
                g.fillText("–",cx,cy+1);
                // Shields (shirt-color crests)
                const sw=W*0.038, sh=W*0.052;
                this._drawShield(cx-W*0.115,cy,sw,sh,"#ffffff","#888888");
                const ac=this.aiColor;
                this._drawShield(cx+W*0.115,cy,sw,sh,ac,ac==="#111111"?"#555555":"rgba(0,0,0,0.5)");
                // Team names
                g.font=`bold ${Math.max(11,Math.min(14,W*0.019))}px sans-serif`;
                g.fillStyle="#ffffff"; g.textBaseline="middle";
                g.textAlign="right";
                g.fillText(short(this.homeTeam).toUpperCase(),cx-W*0.148,cy+1);
                g.textAlign="left";
                g.fillText(short(this.awayTeam).toUpperCase(),cx+W*0.148,cy+1);
                // Time / GOAL! row
                const min=this.matchMinute??0;
                const rowCy=mh+th/2;
                g.textAlign="center"; g.textBaseline="middle";
                const fkActive=this.attackVariant===6&&(this.kickTick>0||this.shotActive);
                const penActive=this.attackVariant===7&&(this.kickTick>0||this.shotActive);
                if(goalActive){
                    g.font="bold 15px monospace"; g.fillStyle="#f7f15b";
                    g.fillText(`GOAL!  ${min}'`,cx,rowCy);
                } else if(penActive){
                    g.font="bold 14px monospace"; g.fillStyle="#ff4444";
                    g.fillText(`PENALTY  ${min}'`,cx,rowCy);
                } else if(fkActive&&this.kickTick>0){
                    g.font="bold 14px monospace"; g.fillStyle="#f7a93c";
                    g.fillText(`FREE KICK  ${min}'`,cx,rowCy);
                } else {
                    g.font="bold 16px monospace"; g.fillStyle="#999999";
                    g.fillText(`${min}'`,cx,rowCy);
                }
                if(this._debugNums && this.dribbleActive){
                    const vNames=["dribble","dribble","dribble","corner","wall-pass","cross","free-kick","penalty"];
                    const lbl=`v${this.attackVariant} ${vNames[this.attackVariant]||""}`;
                    g.font="10px monospace"; g.fillStyle="#ff0"; g.textAlign="right";
                    g.fillText(lbl, W-6, rowCy);
                }
                g.restore();
            }

            _drawShield(cx,cy,w,h,fill,border) {
                const g=this.g, x=cx-w/2, y=cy-h/2, r=w*0.18;
                const P=()=>{
                    g.beginPath();
                    g.moveTo(x+r,y);g.lineTo(x+w-r,y);
                    g.quadraticCurveTo(x+w,y,x+w,y+r);
                    g.lineTo(x+w,y+h*0.60);
                    g.quadraticCurveTo(x+w,y+h*0.83,cx,y+h);
                    g.quadraticCurveTo(x,y+h*0.83,x,y+h*0.60);
                    g.lineTo(x,y+r);
                    g.quadraticCurveTo(x,y,x+r,y);
                    g.closePath();
                };
                g.save();
                P(); g.fillStyle=fill; g.fill();
                P(); g.clip();
                const light="rgba(255,255,255,0.22)", dark="rgba(0,0,0,0.14)";
                const pat=fill==="#ffffff"||fill==="#cccccc"?dark:light;
                if(fill==="#cc2222"){
                    // Two vertical white stripes (red kit — AC Milan style)
                    g.fillStyle=pat;
                    g.fillRect(cx-w*0.36,y,w*0.17,h);
                    g.fillRect(cx+w*0.19,y,w*0.17,h);
                } else if(fill==="#1155cc"){
                    // Horizontal white band across centre (blue kit — Inter style)
                    g.fillStyle=pat;
                    g.fillRect(x,cy-h*0.15,w,h*0.30);
                } else if(fill==="#111111"){
                    // Diagonal white stripe (black kit — Juventus style)
                    g.fillStyle=pat;
                    g.beginPath();
                    g.moveTo(cx-w*0.08,y);g.lineTo(cx+w*0.42,y);
                    g.lineTo(cx+w*0.08,y+h);g.lineTo(cx-w*0.42,y+h);
                    g.closePath(); g.fill();
                } else {
                    // Default: diagonal dark stripe on white/light kit
                    g.fillStyle=pat;
                    g.beginPath();
                    g.moveTo(cx-w*0.08,y);g.lineTo(cx+w*0.42,y);
                    g.lineTo(cx+w*0.08,y+h);g.lineTo(cx-w*0.42,y+h);
                    g.closePath(); g.fill();
                }
                g.restore();
                P(); g.strokeStyle=border; g.lineWidth=1.5; g.stroke();
            }

            _ball(x, y, r) {
                const g=this.g;
                g.fillStyle="#f7f4e9";
                g.beginPath(); g.arc(x,y,r,0,Math.PI*2); g.fill();
                g.strokeStyle="#111"; g.lineWidth=1;
                g.beginPath(); g.arc(x,y,r,0,Math.PI*2); g.stroke();
                g.fillStyle="#111";
                g.beginPath(); g.arc(x,y,r*.32,0,Math.PI*2); g.fill();
                for(let i=0;i<5;i++){
                    const a=-Math.PI/2+i*Math.PI*2/5;
                    g.beginPath();
                    g.arc(x+Math.cos(a)*r*.68,y+Math.sin(a)*r*.68,r*.16,0,Math.PI*2);
                    g.fill();
                }
            }

            _fig(x, y, isHome, run, kickDir=0, kickPower=0, sz=14) {
                const g=this.g,c=isHome?"#ffffff":this.aiColor,s=sz,ph=this.phase;
                g.strokeStyle=c; g.fillStyle=c; g.lineWidth=1.5;
                g.beginPath(); g.arc(x,y-s*.65,s*.18,0,Math.PI*2); g.fill();
                g.beginPath(); g.moveTo(x,y-s*.45); g.lineTo(x,y); g.stroke();
                const sw=run?Math.sin(ph*3)*.25:0;
                g.beginPath(); g.moveTo(x-s*(.32+sw),y-s*.25); g.lineTo(x+s*(.32-sw),y-s*.25); g.stroke();
                const lw=run?Math.sin(ph*3)*.38:0;
                if(kickDir) {
                    const wind=Math.sin(kickPower*Math.PI);
                    const plantX=x-kickDir*s*.22;
                    const plantY=y+s*.44;
                    const bootX=x+kickDir*s*(.20+wind*.82);
                    const bootY=y+s*(.44-wind*.22);
                    g.beginPath(); g.moveTo(x,y); g.lineTo(plantX,plantY); g.stroke();
                    g.beginPath(); g.moveTo(x,y); g.lineTo(bootX,bootY); g.stroke();
                    return;
                }
                g.beginPath(); g.moveTo(x,y); g.lineTo(x-s*(.26+lw),y+s*.44); g.stroke();
                g.beginPath(); g.moveTo(x,y); g.lineTo(x+s*(.26-lw),y+s*.44); g.stroke();
            }

            _keeper(x, y, isHome) {
                const g=this.g,c=isHome?"#ffffff":this.aiColor,s=13,ph=this.phase;
                g.strokeStyle=c; g.fillStyle=c; g.lineWidth=1.8;
                g.beginPath(); g.arc(x,y-s*.70,s*.18,0,Math.PI*2); g.fill();
                g.beginPath(); g.moveTo(x,y-s*.50); g.lineTo(x,y+s*.10); g.stroke();
                const dive=Math.sin(ph*4)*s*.08;
                g.beginPath(); g.moveTo(x-s*.78,y-s*.34+dive); g.lineTo(x+s*.78,y-s*.42-dive); g.stroke();
                g.beginPath(); g.moveTo(x,y+s*.08); g.lineTo(x-s*.42,y+s*.55); g.stroke();
                g.beginPath(); g.moveTo(x,y+s*.08); g.lineTo(x+s*.42,y+s*.55); g.stroke();
            }

            _drawBanner() {
                // Banners removed — goal shown in scoreboard sub-row
            }

            _updateOverlay() {
                // Banner drawn on canvas; HTML element kept for accessibility only
                const el=document.getElementById("matchOverlay");
                if(!el) return;
                el.className="match-overlay"; // never show visually
                if(this.goalTick>0) el.setAttribute("aria-label","Goal!");
                else if(this.bannTick>0) el.setAttribute("aria-label",this.bannType==="nogoal"?"No Goal!":"Saved!");
                else el.removeAttribute("aria-label");
            }

            _hideOverlay() {
                const el=document.getElementById("matchOverlay");
                if(!el) return;
                el.className="match-overlay";
                el.removeAttribute("aria-label");
            }

            destroy() { if(this._raf){cancelAnimationFrame(this._raf);this._raf=null;} }
        }

        let matchViz = null;
        // Defer init until DOM is ready (canvas element may not exist yet if no game)
        function ensureViz() {
            if (!matchViz || !matchViz.cv) matchViz = new MatchVisualizer("pitchCanvas");
            return matchViz;
        }

        function render() {
            if (!state) return;
            const hasActiveGame = (state.human_teams || []).length > 0;
            document.getElementById("heroContent").style.display = "";
            document.getElementById("newSeasonForm").style.display = hasActiveGame ? "none" : "";
            document.getElementById("seasonActions").style.display = hasActiveGame ? "flex" : "none";
            if (hasActiveGame) {
                document.getElementById("teamPicker").style.display = "none";
            }

            // Status bar
            document.getElementById("statusDivision").textContent =
                `Division ${state.division}`;
            document.getElementById("statusSeason").textContent =
                `Season ${state.season_number}`;
            document.getElementById("statusLeague").textContent =
                `Match ${state.league_match}/${state.total_league_matches}`;
            const cupText = state.cup_eliminated
                ? "Cup: Eliminated"
                : state.cup_round > 0
                    ? `Cup: Round ${state.cup_round}`
                    : "Cup: Not started";
            document.getElementById("statusCup").textContent = cupText;
            document.getElementById("statusSkill").textContent =
                `Level ${state.skill_level} — ${esc(state.skill_name)}`;

            document.getElementById("credit").textContent = state.inspiration;
            document.getElementById("skillLevel").value = String(state.skill_level || 1);
            document.querySelectorAll("[data-mode]").forEach(
                b => b.classList.toggle("active", b.dataset.mode === state.mode)
            );

            // Next fixture
            const nf = state.next_fixture || {};
            let nfText = "";
            if (state.season_over) {
                nfText = "<em>Season complete!</em>";
            } else if (nf.type === "cup") {
                nfText = `<strong>FA Cup Round ${nf.cup_round}</strong><br>vs ${esc(nf.opponent)}`;
            } else if (nf.type === "league") {
                nfText = `<strong>League Match ${nf.league_match}</strong><br>vs ${esc(nf.opponent)}`;
            }
            document.getElementById("nextFixture").innerHTML = nfText;
            document.getElementById("visualFixture").textContent = nfText.replace(/<[^>]*>/g, " ");
            const visualScore = document.getElementById("visualScore");
            if (visualScore && nf?.opponent) {
                const humanName = state.human_teams?.[0]?.name ?? "";
                visualScore.textContent = `${humanName} 0 - 0 ${nf.opponent}`;
            }
            const visualBanner = document.getElementById("visualBanner");
            if (visualBanner && !animating) visualBanner.textContent = "KICK OFF";

            // Round label
            document.getElementById("roundLabel").textContent = state.season_over
                ? "Season complete — advance to next season?"
                : `Division ${state.division} · Match ${state.league_match + 1}`;

            // Play / end-season buttons
            const _canPlay = (state?.human_teams?.[0]?.lineup_size ?? 0) >= 1 && (state?.human_teams?.[0]?.lineup_size ?? 0) <= 11;
            document.getElementById("playRound").disabled = state.season_over || waitingForMatch || !_canPlay;
            document.getElementById("continueToMatch").disabled = !_canPlay;
            document.getElementById("endSeason").style.display =
                state.season_over ? "inline-flex" : "none";
            document.getElementById("editSquad").style.display =
                (!state.season_over) ? "inline-flex" : "none";

            // League table
            document.getElementById("tableDiv").textContent = state.division;
            const tbody = (state.table || []).map((row, i) => `
                <tr class="${row.is_human ? "player" : ""}">
                    <td>${i + 1}</td>
                    <td>${esc(row.name)}</td>
                    <td>${row.gf}</td>
                    <td>${row.ga}</td>
                    <td>${row.gd >= 0 ? "+" : ""}${row.gd}</td>
                    <td><strong>${row.pts}</strong></td>
                </tr>`).join("");
            document.getElementById("leagueTable").innerHTML = `
                <thead>
                  <tr><th>#</th><th>Club</th><th>F</th><th>A</th><th>GD</th><th>Pts</th></tr>
                </thead>
                <tbody>${tbody}</tbody>`;

            // Match report — skip during animation (animateMatchReport handles live updates)
            if (!animating) {
                const reports = state.last_matches || [];
                document.getElementById("latestMatch").innerHTML = reports.length
                    ? reports.map(m => {
                        const events = timedReportEvents(m.report);
                        const finances = m.report.filter(l => isFinanceLine(l));
                        return `
                        <article class="report">
                            <div class="score">${esc(m.home)} ${m.home_goals} – ${m.away_goals} ${esc(m.away)}</div>
                            <ul>${events.map(reportLine).join("")}</ul>
                            ${financeHtml(finances)}
                        </article>`;
                    }).join("")
                    : "Awaiting kick-off.";
            }

            // Other matches (only when not mid-animation)
            if (!animating && uiPhase === "report") {
                renderOtherMatches(state.other_matches || [], state.division);
            } else if (uiPhase !== "report") {
                document.getElementById("otherMatches").innerHTML = "";
            }

            renderPreMatch();

            // Squad panel
            const human = (state.human_teams || [])[0];
            if (human) {
                document.getElementById("squadTeamName").textContent = human.name;
                const lineupBadge = document.getElementById("lineupBadge");
                lineupBadge.textContent = `${squadFormation(human.squad)} · ${human.lineup_size}/11`;
                lineupBadge.className = `lineup-badge ${human.lineup_size === 11 ? "lineup-ok" : "lineup-bad"}`;
                renderTeamSummary(human);
                const sortedSquad = [...(human.squad || [])].sort((a, b) => {
                    const order = { G: 0, D: 1, M: 2, A: 3 };
                    const posDiff = (order[a.position] ?? 9) - (order[b.position] ?? 9);
                    if (posDiff !== 0) return posDiff;
                    if (a.active !== b.active) return a.active ? -1 : 1;
                    return String(a.name).localeCompare(String(b.name));
                });
                const groups = [
                    ["G", "Goalkeeper"],
                    ["D", "Defenders"],
                    ["M", "Midfielders"],
                    ["A", "Attackers"],
                ];
                document.getElementById("squadList").innerHTML =
                    groups.map(([pos, label]) => {
                        const rows = sortedSquad
                            .filter(p => p.position === pos)
                            .sort((a, b) => {
                                if (a.active !== b.active) return a.active ? -1 : 1;
                                return String(a.name).localeCompare(String(b.name));
                            });
                        if (rows.length === 0) return "";
                        return `
                        <section class="squad-column">
                            <h3>${label}</h3>
                            <div class="squad-table-head">
                                <span>Name</span>
                                <span>Skills</span>
                                <span>Energy</span>
                                <span>Value</span>
                                <span>Morale</span>
                                <span class="col-status">Lineup</span>
                            </div>
                            <div class="player-list">
                                ${rows.map(p => playerRow(p, human.name, true, p.position === "G")).join("")}
                            </div>
                        </section>`;
                    }).join("");
            }

            // Transfer market — only visible after a match
            const transferPanel = document.getElementById("transferPanel");
            transferPanel.style.display = state.transfer_window ? "" : "none";
            document.querySelector(".management-top")?.classList.toggle("no-transfer", !state.transfer_window);
            if (state.transfer_window) {
                const messageEl = document.getElementById("transferMessage");
                messageEl.textContent = transferMessage;
                messageEl.style.display = transferMessage ? "" : "none";
                document.getElementById("transferMarket").innerHTML =
                    (state.transfer_market || []).length
                        ? (state.transfer_market || []).map(p => playerRow(p, human?.name || "", false)).join("")
                        : '<p class="muted small">No player available.</p>';
            }

            document.querySelectorAll("[data-squad-action]").forEach(button => {
                button.classList.toggle("active", button.dataset.squadAction === squadAction);
            });

            applyUiPhase();
        }

        function renderTeamSummary(team) {
            document.getElementById("loanInfo").innerHTML =
                `<span>Loan: <strong>${fmt(team.loan)}</strong></span>` +
                `<span>Interest: ${fmt(team.loan_interest)}/wk</span>` +
                `<span>Max: ${fmt(team.loan_limit)}</span>`;
            const luOk = team.lineup_size === 11;
            document.getElementById("teamSummary").innerHTML =
                `<div>Cash: ${fmt(team.cash)}</div>` +
                `<div>Gate: ${fmt(team.gate_money)}</div>` +
                `<div>Wages: ${fmt(team.wage_bill)}/wk</div>` +
                `<div>Rent: ${fmt(team.ground_rent)}/wk</div>` +
                `<div>Squad: ${team.squad_size}/${team.max_squad_size}</div>` +
                `<div>Morale: ${team.retro_morale}/20</div>` +
                `<div class="summary-lineup ${luOk ? "lu-ok" : "lu-bad"}">Lineup: <strong>${team.lineup_size}/11</strong></div>`;
        }

        function posLabel(pos) {
            return pos === "D" ? "DEF" : pos === "M" ? "MID" : "ATK";
        }

        function posClass(pos) {
            return pos === "D" ? "pos-d" : pos === "M" ? "pos-m" : "pos-a";
        }

        function energyClass(energy) {
            if (energy >= 15) return "energy-high";
            if (energy >= 8) return "energy-mid";
            return "energy-low";
        }

        function legacyPlayerRow(player, teamName, owned) {
            const inj = player.injured ? ` <em class="inj">INJ</em>` : "";
            const moraleStr = player.morale != null ? `Morale ${player.morale}/20 · ` : "";
            const statLine = `${posLabel(player.position)} · Skill ${player.skill}`;
            const energyHtml = `<em class="energy-value ${energyClass(player.energy)}">${player.energy}/20</em>`;
            const statLine2 = `${moraleStr}Value ${fmt(player.value)}`;
            const pc = posClass(player.position);
            if (owned) {
                const sellDisabled = player.injured || state?.transfer_sold_this_window ? "disabled" : "";
                let lineupLabel = player.active ? "▶ Playing" : "— Bench";
                let lineupClass = player.active ? "btn-playing" : "btn-bench";
                if (pendingLineupIn) {
                    if (player.id === pendingLineupIn.id) {
                        lineupLabel = "Selected";
                        lineupClass = "btn-swap";
                    } else if (player.active) {
                        lineupLabel = `Bench for ${pendingLineupIn.name}`;
                        lineupClass = "btn-swap";
                    }
                }
                return `
                <div class="player-row ${player.active ? "active-player" : ""} ${player.injured ? "injured-player" : ""}">
                    <div>
                        <strong class="${pc}">${esc(player.name)}${inj}</strong>
                        <span>${esc(statLine)} · ${energyHtml}</span>
                        <span>${esc(statLine2)}</span>
                    </div>
                    <div class="player-actions">
                        <button data-lineup="${esc(player.id)}" data-team="${esc(teamName)}"
                            class="${lineupClass}"
                            ${player.injured ? "disabled" : ""}>${esc(lineupLabel)}</button>
                        <button data-rename-player="${esc(player.id)}" data-team="${esc(teamName)}">Rename</button>
                        <button data-sell="${esc(player.id)}" data-team="${esc(teamName)}"
                            ${sellDisabled}>Sell</button>
                    </div>
                </div>`;
            } else {
                const buyDisabled = state?.transfer_bought_this_window ? "disabled" : "";
                return `
                <div class="player-row">
                    <div>
                        <strong class="${pc}">${esc(player.name)}</strong>
                        <span>${esc(statLine)} · ${energyHtml}</span>
                        <span>${esc(statLine2)}</span>
                    </div>
                    <div class="player-actions">
                        <button data-buy="${esc(player.id)}" data-team="${esc(teamName)}" ${buyDisabled}>
                            Sign ${fmt(player.value)}
                        </button>
                    </div>
                </div>`;
            }
        }

        function squadFormation(squad) {
            const ep = p => p.playing_as || p.position;
            const d = (squad || []).filter(p => p.active && ep(p) === "D").length;
            const m = (squad || []).filter(p => p.active && ep(p) === "M").length;
            const a = (squad || []).filter(p => p.active && ep(p) === "A").length;
            return `${d}-${m}-${a}`;
        }

        function skillProfile(player) {
            if (player.position === "G") {
                return `G${player.skill_g ?? player.skill} M${player.skill_m ?? 1} D${player.skill_d ?? 1}`;
            }
            if (player.skill_d || player.skill_m || player.skill_a) {
                return `D${player.skill_d} M${player.skill_m} A${player.skill_a}`;
            }
            return `${player.skill}`;
        }

        function moraleHtml(player) {
            const m = player.morale ?? 0;
            const d = player.morale_delta ?? 0;
            const dStr = d > 0 ? `+${d}` : d < 0 ? `${d}` : null;
            const dc = d > 0 ? "morale-up" : d < 0 ? "morale-dn" : "";
            return `<span class="morale-val">M·${m}</span>${dStr ? `<span class="${dc}"> ${dStr}</span>` : ""}`;
        }

        function playerRow(player, teamName, owned, isGK=false) {
            const inj = player.injured ? ` <em class="inj">INJ</em>` : "";
            const pc = posClass(player.position);
            const energyHtml = `<em class="energy-value ${energyClass(player.energy)}">${player.energy}/20</em>`;
            const skills = skillProfile(player);
            if (owned) {
                let statusLabel = player.active ? (isGK ? "G" : (player.playing_as || player.position)) : "Bench";
                let statusClass = player.active ? "status-playing" : "status-bench";
                let statusContent = esc(statusLabel);
                let statusAttrs = "";
                if (pendingLineupIn) {
                    if (player.id === pendingLineupIn.id) { statusLabel = "Selected"; statusClass = "status-swap"; statusContent = esc(statusLabel); }
                    else if (player.active) {
                        // GK can only swap with GK; outfield can only swap with outfield
                        const sameGroup = (player.position === "G") === (pendingLineupIn.position === "G");
                        if (sameGroup) { statusLabel = "Swap"; statusClass = "status-swap"; statusContent = esc(statusLabel); }
                    }
                } else if (squadAction === "sell") {
                    statusLabel = "Sell";
                    const activeGkWithNoBackup = player.active && player.position === "G" && (() => {
                        const squad = state?.human_teams?.[0]?.squad || [];
                        return !squad.some(p => p.position === "G" && p.id !== player.id && !p.injured);
                    })();
                    statusClass = player.injured || state?.transfer_sold_this_window || activeGkWithNoBackup ? "status-disabled" : "status-action";
                    statusContent = esc(statusLabel);
                } else if (!player.injured && player.position !== "G") {
                    // Role picker popup (not for GK — they toggle in/out via lineup)
                    statusAttrs = ` data-cycle-role="${esc(player.id)}" data-team="${esc(teamName)}"`;
                    if (pendingRolePlayer === player.id) {
                        const curRole = player.active ? (player.playing_as || player.position) : "Bench";
                        const chips = ["D","M","A","Bench"].map(r =>
                            `<span class="role-chip${r === curRole ? " role-current" : ""}" data-pick-role="${r === "Bench" ? "" : r}" data-player-id="${esc(player.id)}" data-team="${esc(teamName)}">${r}</span>`
                        ).join("");
                        statusContent = `${esc(statusLabel)}<span class="role-picker-popup">${chips}</span>`;
                        statusClass += " status-picker-open";
                    }
                }
                return `
                <button type="button"
                    class="player-row player-select ${player.active ? "active-player" : ""} ${player.injured ? "injured-player" : ""}"
                    data-player-select="${esc(player.id)}" data-team="${esc(teamName)}">
                    <span class="player-name-cell">
                        <strong class="${pc}" data-rename-player="${esc(player.id)}" data-team="${esc(teamName)}" data-current-name="${esc(player.name)}">${esc(player.name)}${inj}</strong>
                    </span>
                    <span class="skill-profile">${skills}</span>
                    <span>${energyHtml}</span>
                    <span>${fmt(player.value)}</span>
                    <span class="morale-cell">${moraleHtml(player)}</span>
                    <span class="player-status ${statusClass}"${statusAttrs}>${statusContent}</span>
                </button>`;
            }
            const buyDisabled = state?.transfer_bought_this_window ? "disabled" : "";
            return `
            <button type="button" class="player-row transfer-row${buyDisabled ? " player-disabled" : ""}"
                data-buy="${esc(player.id)}" data-team="${esc(teamName)}" ${buyDisabled}>
                <span class="player-name-cell">
                    <strong class="${pc}">${esc(player.name)}</strong>
                </span>
                <span class="skill-profile">${skills}</span>
                <span>${energyHtml}</span>
                <span>${fmt(player.value)}</span>
                <span class="morale-cell">${moraleHtml(player)}</span>
                <span class="player-status status-action">Sign</span>
            </button>`;
        }

        const ALL_TEAM_NAMES = [
            "Arsenal","Aston V.","Brighton","Coventry","Everton","Ipswich",
            "Liverpool","Luton","Man.City","Man.Utd","Norwich","Notts.F.",
            "Swansea","Spurs","Watford","West Ham",
            "Blackburn","Bolton","Cambridge","Charlton","Chelsea","Crystal P.",
            "Derby Co.","Fulham","Grimsby","Leeds","Middlesbro","Newcastle",
            "Oldham","Q.P.R.","Rotherham","Sheff.Wed",
            "Bradford","Brentford","Bristol R.","Cardiff","Doncaster","Exeter",
            "Lincoln","Millwall","Newport","Orient","Oxford","Plymouth",
            "Preston","Reading","Southend","Walsall",
            "Blackpool","Bury","Colchester","Crewe","Darlington","Halifax",
            "Hartlepool","Hereford","Hull","Mansfield","Port Vale","Rochdale",
            "Scunthorpe","Stockport","Torquay","York City",
        ];

        let pendingManagerName = null;

        function showTeamPicker(managerName, restart = false) {
            restartingSeason = restart;
            pendingManagerName = managerName;
            document.getElementById("heroContent").style.display = "none";
            document.getElementById("teamPicker").style.display = "";
            document.getElementById("teamPickerTitle").textContent = restart ? "Choose a new team" : "Choose a team";
            hideGameViews();
            let html = "";
            for (let div = 1; div <= 4; div++) {
                html += `<div class="team-div-group"><h3>Division ${div}</h3>`;
                for (let i = 0; i < 16; i++) {
                    const idx = (div - 1) * 16 + i;
                    html += `<button class="team-btn" data-team-index="${idx}">${esc(ALL_TEAM_NAMES[idx])}</button>`;
                }
                html += `</div>`;
            }
            document.getElementById("teamPickerList").innerHTML = html;
        }

        // Event listeners
        document.getElementById("newSeasonForm").addEventListener("submit", e => {
            e.preventDefault();
            const name = document.getElementById("managerName").value.trim() || "Manager";
            showTeamPicker(name);
        });

        document.getElementById("newGameButton").addEventListener("click", () => {
            if (!confirm("Start a new game? The current season will be replaced.")) return;
            try { localStorage.removeItem(localSaveKey); } catch (err) {}
            pendingLineupIn = null;
            waitingForMatch = false;
            animating = false;
            const name = document.getElementById("managerName").value.trim() || "Manager";
            showTeamPicker(name, true);
        });

        document.getElementById("teamPickerBack").addEventListener("click", () => {
            document.getElementById("teamPicker").style.display = "none";
            document.getElementById("heroContent").style.display = "";
            if (restartingSeason && state) {
                restartingSeason = false;
                render();
                return;
            }
            restartingSeason = false;
        });

        document.getElementById("playRound").addEventListener("click", () => {
            waitingForMatch = true;
            const playButton = document.getElementById("playRound");
            playButton.disabled = true;
            playButton.textContent = "Playing...";
            if (playResponseTimer) clearTimeout(playResponseTimer);
            playResponseTimer = setTimeout(() => {
                clearPlayWait();
                uiPhase = inferPhase(state);
                render();
                alert("Match did not start. The local save was restored if available; try Play again.");
            }, 8000);
            emitGame("play_round", { save_blob: getLocalSaveBlob() });
        });

        document.getElementById("endSeason").addEventListener("click", () =>
            emitGame("end_season"));

        document.getElementById("editSquad").addEventListener("click", () => {
            uiPhase = "management";
            render();
        });

        document.getElementById("preMatchContent").addEventListener("click", e => {
            if (!e.target.closest("[data-pm-rename]")) return;
            const team = (state?.human_teams?.[0])?.name || "";
            const name = prompt("New club name", team);
            if (name) emitGame("rename_team", { team, name });
        });

        document.getElementById("closeReport").addEventListener("click", () => {
            uiPhase = "management";
            render();
        });

        document.getElementById("continueToMatch").addEventListener("click", () => {
            uiPhase = "pre";
            render();
        });

        document.getElementById("skillLevel").addEventListener("change", e =>
            emitGame("set_skill_level", { level: e.target.value }));

        document.getElementById("borrowButton").addEventListener("click", () => {
            const team = (state?.human_teams?.[0])?.name || "";
            const amount = parseInt(document.getElementById("loanAmount").value, 10);
            emitGame("borrow", { team, amount });
        });

        document.getElementById("repayButton").addEventListener("click", () => {
            const team = (state?.human_teams?.[0])?.name || "";
            const amount = parseInt(document.getElementById("loanAmount").value, 10);
            emitGame("repay", { team, amount });
        });

        document.getElementById("renameTeamButton").addEventListener("click", () => {
            const team = (state?.human_teams?.[0])?.name || "";
            const name = prompt("New club name", team);
            if (name) emitGame("rename_team", { team, name });
        });


        document.querySelectorAll("[data-mode]").forEach(b =>
            b.addEventListener("click", () =>
                emitGame("set_tactics", { mode: b.dataset.mode })));

        document.querySelectorAll("[data-squad-action]").forEach(b =>
            b.addEventListener("click", () => {
                squadAction = b.dataset.squadAction || "lineup";
                pendingLineupIn = null;
                render();
            }));

        document.addEventListener("click", e => {
            const teamBtn = e.target.closest("[data-team-index]");
            if (teamBtn) {
                const idx = parseInt(teamBtn.dataset.teamIndex, 10);
                restartingSeason = false;
                document.getElementById("teamPicker").style.display = "none";
                document.getElementById("heroContent").style.display = "";
                try { localStorage.removeItem(localSaveKey); } catch (err) {}
                emitGame("new_season", { managers: pendingManagerName, team_index: idx });
                return;
            }
            const buy = e.target.closest("[data-buy]");
            if (buy) {
                transferMessage = "";
                emitGame("buy_player", { team: buy.dataset.team, player_id: buy.dataset.buy });
                return;
            }
            const pickRole = e.target.closest("[data-pick-role]");
            if (pickRole) {
                const role = pickRole.dataset.pickRole;
                emitGame("set_player_role", { team: pickRole.dataset.team, player_id: pickRole.dataset.playerId, role });
                pendingRolePlayer = null;
                return;
            }
            const renameP = e.target.closest("[data-rename-player]");
            if (renameP) {
                const currentName = renameP.dataset.currentName || "";
                const name = prompt("Rename player", currentName);
                if (name && name.trim()) emitGame("rename_player", {
                    team: renameP.dataset.team,
                    player_id: renameP.dataset.renamePlayer,
                    name: name.trim(),
                });
                return;
            }
            const cycleRole = e.target.closest("[data-cycle-role]");
            if (cycleRole) {
                const human = (state?.human_teams || [])[0];
                const player = (human?.squad || []).find(p => p.id === cycleRole.dataset.cycleRole);
                if (player && !player.injured) {
                    pendingRolePlayer = pendingRolePlayer === player.id ? null : player.id;
                    render();
                }
                return;
            }
            const playerSelect = e.target.closest("[data-player-select]");
            if (playerSelect) {
                const human = (state?.human_teams || [])[0];
                const player = (human?.squad || []).find(p => p.id === playerSelect.dataset.playerSelect);
                if (!player) return;
                const role = e.target.closest("[data-role]");
                if (role) {
                    const position = role.dataset.role;
                    if (position && position !== player.position) {
                        emitGame("change_player_position", {
                            team: playerSelect.dataset.team,
                            player_id: player.id,
                            position,
                        });
                    }
                    return;
                }
                if (squadAction === "sell") {
                    if (player.injured || state?.transfer_sold_this_window) return;
                    const lo = fmt(Math.floor(player.value * 0.8));
                    const hi = fmt(Math.floor(player.value * 1.3));
                    if (!confirm(`Sell ${player.name}?\nExpected offer: ${lo} – ${hi}`)) return;
                    emitGame("sell_player", { team: playerSelect.dataset.team, player_id: player.id });
                    return;
                }
                if (squadAction === "role") return;
                if (pendingLineupIn && player.active) {
                    const sameGroup = (player.position === "G") === (pendingLineupIn.position === "G");
                    if (sameGroup) {
                        emitGame("swap_lineup", {
                            team: playerSelect.dataset.team,
                            in_player_id: pendingLineupIn.id,
                            out_player_id: player.id,
                        });
                    }
                    pendingLineupIn = null;
                    return;
                }
                if (pendingLineupIn && player.id === pendingLineupIn.id) {
                    pendingLineupIn = null;
                    render();
                    return;
                }
                if (!player.active && human?.lineup_size >= 11) {
                    if (player.injured) return;
                    pendingLineupIn = { id: player.id, name: player.name, position: player.position };
                    render();
                    return;
                }
                pendingLineupIn = null;
                if (!player.injured) {
                    emitGame("toggle_lineup", { team: playerSelect.dataset.team, player_id: player.id });
                }
                return;
            }
            const sell = e.target.closest("[data-sell]");
            if (sell) { emitGame("sell_player", { team: sell.dataset.team, player_id: sell.dataset.sell }); return; }
            const lineup = e.target.closest("[data-lineup]");
            if (lineup) {
                const human = (state?.human_teams || [])[0];
                const player = (human?.squad || []).find(p => p.id === lineup.dataset.lineup);
                if (!player) return;
                if (pendingLineupIn && player.active) {
                    const sameGroup = (player.position === "G") === (pendingLineupIn.position === "G");
                    if (sameGroup) {
                        emitGame("swap_lineup", {
                            team: lineup.dataset.team,
                            in_player_id: pendingLineupIn.id,
                            out_player_id: player.id,
                        });
                    }
                    pendingLineupIn = null;
                    return;
                }
                if (pendingLineupIn && player.id === pendingLineupIn.id) {
                    pendingLineupIn = null;
                    render();
                    return;
                }
                if (!player.active && human?.lineup_size >= 11) {
                    pendingLineupIn = { id: player.id, name: player.name, position: player.position };
                    render();
                    return;
                }
                pendingLineupIn = null;
                emitGame("toggle_lineup", { team: lineup.dataset.team, player_id: lineup.dataset.lineup });
                return;
            }
        });

        socket.on("connect", () => emitGame("join", {}));
        socket.on("state_missing", () => restoreLocalState());
        socket.on("state", payload => {
            saveLocalState(payload);
            const wasWaiting = waitingForMatch;
            clearPlayWait();
            pendingLineupIn = null;
            transferMessage = "";
            if (payload.transfer_sold_this_window && squadAction === "sell") squadAction = "lineup";
            state = payload;
            if (wasWaiting && payload.last_matches?.length > 0) {
                animating = true;
                uiPhase = "playing";
            } else if (!(uiPhase === "management" && payload.transfer_window)) {
                uiPhase = inferPhase(payload);
            }
            render();
            if (wasWaiting && payload.last_matches?.length > 0) {
                applyUiPhase();
                document.getElementById("playRound").disabled = true;
                document.getElementById("otherMatches").innerHTML = "";
                animateMatchReport(payload.last_matches).then(() => {
                    animating = false;
                    uiPhase = "report";
                    render();
                });
            }
        });
        socket.on("action_error", payload => {
            clearPlayWait();
            pendingLineupIn = null;
            const message = (payload?.message) || "Action failed.";
            if (payload?.action === "buy_player" && state?.transfer_window) {
                transferMessage = message;
                uiPhase = "management";
                if (state) render();
                return;
            }
            uiPhase = inferPhase(state);
            if (state) render();
            alert(message);
        });
    </script>
</body>
</html>
