<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Retro Football Manager</title>
    <link rel="stylesheet" href="/static/css/app.css">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
    <div id="matchOverlay" class="match-overlay" aria-live="polite"></div>
    <main class="shell">
        <section class="hero">
            <div class="pitch"></div>
            <div id="heroContent" class="hero-content">
                <div>
                    <h1>Football Manager</h1>
                    <p id="credit" class="muted"></p>
                </div>
                <form id="newSeasonForm" class="new-season">
                    <input id="managerName" type="hidden" value="{{ username }}">
                    <button type="submit">Choose Team →</button>
                </form>
                <div id="seasonActions" class="season-actions" style="display:none">
                    <button id="newGameButton" type="button">New game</button>
                </div>
            </div>
            <div id="teamPicker" class="team-picker" style="display:none">
                <div class="team-picker-header">
                    <button id="teamPickerBack" type="button" class="team-picker-back">← Back</button>
                    <span id="teamPickerTitle" class="team-picker-title"></span>
                </div>
                <div id="teamPickerList" class="team-picker-divs"></div>
            </div>
        </section>

        <!-- Status bar -->
        <section id="statusBar" class="status-bar" style="display:none">
            <span id="statusDivision"></span>
            <span id="statusSeason"></span>
            <span id="statusLeague"></span>
            <span id="statusCup"></span>
            <span id="statusSkill"></span>
        </section>

        <!-- Controls row -->
        <section id="setupControls" class="controls" style="display:none">
            <div class="panel">
                <h2>Engine</h2>
                <div class="button-row">
                    <button data-mode="retro">Retro</button>
                    <button data-mode="modern">Modern</button>
                </div>
            </div>
            <div class="panel">
                <h2>Skill Level</h2>
                <select id="skillLevel">
                    <option value="1">1 — Beginner</option>
                    <option value="2">2 — Novice</option>
                    <option value="3">3 — Average</option>
                    <option value="4">4 — Good</option>
                    <option value="5">5 — Expert</option>
                    <option value="6">6 — Super Expert</option>
                    <option value="7">7 — Genius</option>
                </select>
            </div>
            <div class="panel">
                <h2>Next Match</h2>
                <div id="nextFixture" class="next-fixture"></div>
            </div>
        </section>

        <!-- Pre-match comparison -->
        <section id="preMatchPanel" class="pre-match-panel" style="display:none">
            <h2>Pre-Match</h2>
            <div id="preMatchContent"></div>
            <div class="match-panel pre-match-actions">
                <div id="roundLabel" class="round-label"></div>
                <div class="button-row">
                    <button id="editSquad" type="button" style="display:none">Edit squad</button>
                    <button id="playRound">Play</button>
                    <button id="endSeason" style="display:none">New Season</button>
                </div>
            </div>
        </section>

        <!-- Match visualisation -->
        <section id="matchVisual" class="match-visual" style="display:none">
            <div class="scoreboard-still" style="position:relative">
                <canvas id="pitchCanvas" class="pitch-canvas"></canvas>
                <button id="debugNumBtn" onclick="if(matchViz)matchViz._debugNums=!matchViz._debugNums;this.style.opacity=matchViz&&matchViz._debugNums?'1':'0.4'" style="position:absolute;top:4px;right:4px;font-size:10px;padding:2px 6px;background:#222;color:#aaa;border:1px solid #555;border-radius:3px;cursor:pointer;opacity:0.4;z-index:10">#</button>
                <div id="visualFixture" class="visual-fixture"></div>
            </div>
            <div id="visualScore" class="visual-score"></div>
        </section>

        <!-- Match report -->
        <section id="reportLayout" class="layout" style="display:none">
            <div id="reportPanel" class="panel">
                <h2>Match Report</h2>
                <div id="latestMatch" class="latest-match">Awaiting kick-off.</div>
                <div id="otherMatches"></div>
                <button id="closeReport" class="close-report" type="button" style="display:none">Close report</button>
            </div>
            <div id="tablePanel" class="panel">
                <h2>Division <span id="tableDiv"></span> Table</h2>
                <table id="leagueTable"></table>
            </div>
        </section>

        <!-- Squad management -->
        <section id="managementLayout" class="layout management-layout" style="display:none">
            <div class="panel">
                <div class="panel-title-row">
                    <div class="title-left">
                        <h2>Squad — <span id="squadTeamName"></span></h2>
                        <button id="renameTeamButton" class="title-action" type="button">Rename Club</button>
                    </div>
                    <span id="lineupBadge" class="lineup-badge"></span>
                </div>
                <div class="management-top">
                    <div id="transferPanel" class="transfer-inline" style="display:none">
                        <h2>Transfer Window</h2>
                        <div id="transferMessage" class="transfer-message" role="status" aria-live="polite"></div>
                        <div id="transferMarket" class="player-list"></div>
                    </div>
                    <div id="loanBlock" class="loan-block">
                        <div id="loanInfo" class="loan-info"></div>
                        <div class="loan-controls">
                            <input id="loanAmount" type="number" min="1000" step="1000" value="10000" placeholder="£ amount">
                            <button id="borrowButton" type="button">Borrow</button>
                            <button id="repayButton" type="button">Repay</button>
                        </div>
                    </div>
                </div>
                <div class="management-strip">
                    <div id="teamSummary" class="team-summary"></div>
                    <div class="management-actions">
                        <div class="squad-action-bar" aria-label="Squad action">
                            <button type="button" data-squad-action="sell">Sell</button>
                        </div>
                        <button id="continueToMatch" type="button">Continue to match</button>
                    </div>
                </div>
                <div id="squadList" class="player-list squad-grid"></div>
            </div>
        </section>
    </main>

    <script>
        const socket = io();
        let state = null;
        let waitingForMatch = false;
        let animating = false;
        let uiPhase = "pre";
        const guestDeviceKey = "rfm-guest-id";
        function getGuestDeviceId() {
            try {
                let id = localStorage.getItem(guestDeviceKey);
                if (!id) {
                    id = window.crypto?.randomUUID ? window.crypto.randomUUID() : `${Date.now()}-${Math.random()}`;
                    localStorage.setItem(guestDeviceKey, id);
                }
                return id;
            } catch (err) {
                return `session-${Date.now()}-${Math.random()}`;
            }
        }
        const guestDeviceId = getGuestDeviceId();
        const legacyLocalSaveKey = "rfm-save";
        const localSaveKey = `rfm-save:${guestDeviceId}`;
        const emitGame = (event, payload = {}) => socket.emit(event, { ...(payload || {}), client_id: guestDeviceId });
        let playResponseTimer = null;
        let pendingLineupIn = null;
        let pendingRolePlayer = null;
        let squadAction = "lineup";
        let restartingSeason = false;
        let transferMessage = "";

        const esc = (v) => String(v ?? "")
            .replaceAll("&", "&amp;").replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;").replaceAll('"', "&quot;");

        const fmt = (n) => `£${Number(n).toLocaleString()}`;

        const delay = (ms) => new Promise(r => setTimeout(r, ms));

        function inferPhase(payload) {
            if (payload?.transfer_window && payload?.last_matches?.length) return "report";
            if (payload?.transfer_window) return "management";
            return "pre";
        }

        function saveLocalState(payload) {
            if (!payload?.save_blob) return;
            try {
                localStorage.setItem(localSaveKey, payload.save_blob);
            } catch (err) {
                console.warn("Local save failed", err);
            }
        }

        function restoreLocalState() {
            let saveBlob = "";
            try {
                saveBlob = localStorage.getItem(localSaveKey) || "";
                if (!saveBlob) {
                    saveBlob = localStorage.getItem(legacyLocalSaveKey) || "";
                    if (saveBlob) localStorage.setItem(localSaveKey, saveBlob);
                }
            } catch (err) {
                console.warn("Local save unavailable", err);
            }
            if (saveBlob) {
                emitGame("restore_save", { save_blob: saveBlob });
            }
        }

        function getLocalSaveBlob() {
            try {
                return localStorage.getItem(localSaveKey) || "";
            } catch (err) {
                return "";
            }
        }

        function clearPlayWait() {
            waitingForMatch = false;
            if (playResponseTimer) {
                clearTimeout(playResponseTimer);
                playResponseTimer = null;
            }
            const playButton = document.getElementById("playRound");
            playButton.textContent = "Play";
            const _canPlay = (state?.human_teams?.[0]?.lineup_size ?? 0) >= 1 && (state?.human_teams?.[0]?.lineup_size ?? 0) <= 11;
            playButton.disabled = (state?.season_over ?? false) || !_canPlay;
        }

        function applyUiPhase() {
            if (!state) return;
            const phase = uiPhase;
            const hasActiveGame = (state.human_teams || []).length > 0;
            document.getElementById("statusBar").style.display = (hasActiveGame && phase !== "playing") ? "" : "none";
            document.getElementById("setupControls").style.display = (hasActiveGame && phase === "pre") ? "" : "none";
            document.getElementById("preMatchPanel").style.display = (hasActiveGame && phase === "pre") ? "" : "none";
            document.getElementById("matchVisual").style.display = phase === "playing" ? "" : "none";
            document.getElementById("reportLayout").style.display =
                (phase === "playing" || phase === "report") ? "" : "none";
            document.getElementById("reportLayout").classList.toggle("live-report", phase === "playing");
            document.getElementById("tablePanel").style.display = phase === "report" ? "" : "none";
            document.getElementById("closeReport").style.display =
                (phase === "report" && state.transfer_window) ? "inline-flex" : "none";
            document.getElementById("managementLayout").style.display = phase === "management" ? "" : "none";
        }

        function hideGameViews() {
            [
                "statusBar",
                "setupControls",
                "preMatchPanel",
                "matchVisual",
                "reportLayout",
                "managementLayout",
            ].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.style.display = "none";
            });
        }

        function minuteForEvent(index, total, line) {
            const l = String(line ?? "");
            if (l.startsWith("Final score:")) return 90;
            if (total <= 1) return 45;
            return Math.max(1, Math.min(89, Math.round(1 + (index * 88) / (total - 1))));
        }

        function timedReportEvents(report) {
            const events = (report || []).filter(l => !isFinanceLine(String(l ?? "")) && !isBoringLine(String(l ?? "")));
            return events.map((line, index) => ({
                line,
                minute: minuteForEvent(index, events.length, line),
            }));
        }

        function reportLine(item) {
            const l = String(item?.line ?? item ?? "");
            const minute = item?.minute ? `<span class="match-minute">${item.minute}'</span>` : "";
            const content = `${minute}<span>${esc(l)}</span>`;
            if (l.startsWith("GOAL")) return `<li class="event-goal">${content}</li>`;
            if (l.includes("intercepts") || l.includes("is saved")) return `<li class="event-save">${content}</li>`;
            if (l.includes("shoots wide") || l.includes("shoot wide")) return `<li class="event-wide">${content}</li>`;
            return `<li>${content}</li>`;
        }

        function reportLineClass(line) {
            const l = String(line ?? "");
            if (l.startsWith("GOAL")) return "event-goal";
            if (l.includes("intercepts") || l.includes("is saved")) return "event-save";
            if (l.includes("shoots wide") || l.includes("shoot wide")) return "event-wide";
            return "";
        }

        function renderPreMatch() {
            const pm = state?.pre_match;
            const panel = document.getElementById("preMatchPanel");
            if (state?.season_over) {
                document.getElementById("preMatchContent").innerHTML = "<p>Season complete.</p>";
                return;
            }
            if (!pm) { panel.style.display = "none"; return; }
            const humanName = state.human_teams?.[0]?.name ?? "";
            const showPreMatchRename = (state?.league_match ?? 0) === 0;
            const renameButton = showPreMatchRename
                ? '<button class="pm-rename-btn" type="button" data-pm-rename="1">Rename</button>'
                : "";
            const rows = [
                ["Energy",     pm.human.energy,      pm.ai.energy],
                ["Morale",     pm.human.morale,      pm.ai.morale],
                ["Goalkeeper", pm.human.goalkeeper,  pm.ai.goalkeeper],
                ["Defence",    pm.human.defence,     pm.ai.defence],
                ["Midfield",   pm.human.midfield,    pm.ai.midfield],
                ["Attack",     pm.human.attack,      pm.ai.attack],
            ];
            document.getElementById("preMatchContent").innerHTML = `
                <table class="prematch-table">
                    <thead><tr>
                        <th></th>
                        <th class="pm-human"><span>${esc(humanName)}</span>${renameButton}</th>
                        <th class="pm-ai">${esc(pm.opponent)}</th>
                    </tr></thead>
                    <tbody>${rows.map(([label, h, a]) => `
                        <tr>
                            <td class="pm-label">${label}</td>
                            <td class="pm-human ${h > a ? "pm-stronger" : h < a ? "pm-weaker" : ""}">${h}</td>
                            <td class="pm-ai ${a > h ? "pm-stronger" : a < h ? "pm-weaker" : ""}">${a}</td>
                        </tr>`).join("")}
                    </tbody>
                </table>
                <div class="pm-picked"><span class="${pm.human.lineup_size === 11 ? "pm-ok" : "pm-bad"}">PLAYERS PICKED=${pm.human.lineup_size}</span><span class="pm-formation">${squadFormation(state.human_teams?.[0]?.squad || [])}</span></div>`;
        }

        function renderOtherMatches(matches, division) {
            const el = document.getElementById("otherMatches");
            if (!matches || !matches.length) { el.innerHTML = ""; return; }
            const rows = matches.map(m => {
                const homeWin = m.home_goals > m.away_goals;
                const awayWin = m.away_goals > m.home_goals;
                const draw = m.home_goals === m.away_goals;
                const hc = homeWin ? "om-win" : draw ? "om-draw" : "om-lose";
                const ac = awayWin ? "om-win" : draw ? "om-draw" : "om-lose";
                return `<div class="other-match-item">
                    <span class="${hc}">${esc(m.home)}</span>
                    <span class="om-score">${m.home_goals}-${m.away_goals}</span>
                    <span class="${ac}">${esc(m.away)}</span>
                </div>`;
            }).join("");
            el.innerHTML = `
                <h3 class="other-matches-title">Other Matches — Division ${division}</h3>
                <div class="other-matches-grid">${rows}</div>`;
        }

        function isFinanceLine(l) {
            return l.startsWith("Gate receipts") || l.startsWith("Weekly costs");
        }

        function financeHtml(lines) {
            if (!lines.length) return "";
            let html = '<div class="match-finance">';
            lines.forEach(f => {
                if (f.startsWith("Weekly costs")) {
                    html += `<div class="weekly-bills"><span>Weekly bills</span><strong>${esc(f.replace(/^Weekly costs\s*[—\-]+\s*/, ""))}</strong></div>`;
                } else {
                    html += `<p>${esc(f)}</p>`;
                }
            });
            return html + "</div>";
        }

        // Lines skipped during animation — filler with no match value
        function isBoringLine(l) {
            return l.endsWith(" defend.") || l.startsWith("Midfield battle");
        }

        async function animateMatchReport(matches) {
            const container = document.getElementById("latestMatch");
            container.innerHTML = "";

            for (const m of matches) {
                let curHome = 0, curAway = 0;
                let lastHumanAttacking = true;
                const humanName = (state.human_teams || [])[0]?.name ?? "";
                const humanIsHome = m.home === humanName;
                const viz = ensureViz();
                viz.reset(m.home, m.away);
                const humanSq = (state.human_teams || [])[0]?.squad || [];
                const hGK = humanSq.filter(p => p.active && p.position === "G").length;
                const hD = humanSq.filter(p => p.active && (p.playing_as || p.position) === "D").length;
                const hM = humanSq.filter(p => p.active && (p.playing_as || p.position) === "M").length;
                const hA = humanSq.filter(p => p.active && (p.playing_as || p.position) === "A").length;
                viz.setHumanFormation(hD, hA);
                viz.setFullFormation(hD + hGK, hM, hA);
                await delay(1200);
                const aiCol = viz.aiColor;

                // Score is shown in the canvas scoreboard; clear the visual-score bar
                const vsEl = document.getElementById("visualScore");
                if (vsEl) vsEl.textContent = "";
                const updateVsEl = () => {};

                const article = document.createElement("article");
                article.className = "report";
                container.appendChild(article);

                const scoreEl = document.createElement("div");
                scoreEl.className = "score score-compact";
                scoreEl.textContent = `${m.home} 0 – 0 ${m.away}`;
                article.appendChild(scoreEl);

                const ul = document.createElement("ul");
                article.appendChild(ul);

                const financeLines = [];
                const eventMinutes = timedReportEvents(m.report);
                let eventIndex = 0;

                // Pre-select 2 non-goal events to animate and show; everything else is silent
                const _nonGoalIdxs = [];
                m.report.forEach((ln, i) => {
                    const l = String(ln ?? "");
                    if(isFinanceLine(l)||isBoringLine(l)) return;
                    const isNonGoalResult =
                        l.includes(" shoots wide")||l.includes(" shoot wide")||l.includes(" is saved")||
                        l.includes(" intercepts")||l.includes("runs through")||l.includes("goes wide")||
                        l.includes("over the bar")||l.includes("is blocked")||l.includes("keeper is equal")||
                        l.includes("is cleared")||l.includes("saves it!")||l.includes("pulls off")||l.includes("denies");
                    if(isNonGoalResult) _nonGoalIdxs.push(i);
                });
                const _animNonGoal = new Set(_nonGoalIdxs.sort(()=>Math.random()-0.5).slice(0,2));

                for (let _li=0; _li<m.report.length; _li++) {
                    const l = String(m.report[_li] ?? "");
                    if (isFinanceLine(l)) { financeLines.push(l); continue; }
                    if (isBoringLine(l)) continue;

                    const isFinal     = l.startsWith("Final score:");
                    const isGoal      = l.startsWith("GOAL");
                    const isHighlight = l.startsWith("Highlights:");
                    const isMiss      = l.includes(" shoots wide") || l.includes(" shoot wide");
                    const isSaved     = l.includes(" is saved");
                    const isIntercept = l.includes(" intercepts");
                    const isRetroWide = l.includes("runs through") || l.includes("goes wide") || l.includes("over the bar");
                    const isRetroSave = l.includes("is blocked") || l.includes("keeper is equal") ||
                        l.includes("is cleared") || l.includes("saves it!") ||
                        l.includes("pulls off") || l.includes("denies");
                    const isNonGoalResult = isMiss||isSaved||isIntercept||isRetroWide||isRetroSave;

                    // Always update tracking state (direction, half) even for skipped lines
                    const eventMeta = eventMinutes[eventIndex++] || { minute: 45, line: l };
                    const inSecondHalf = eventMeta.minute > 45;
                    if(inSecondHalf) viz.setSecondHalf();
                    const vizDir = b => inSecondHalf ? !b : b;
                    if(isMiss) lastHumanAttacking = !!(humanName && l.startsWith(humanName));
                    else if(isSaved) lastHumanAttacking = humanIsHome ? l.includes(`by ${m.away}`) : l.includes(`by ${m.home}`);
                    else if(isIntercept) lastHumanAttacking = !(humanName && l.startsWith(humanName));
                    else if(!isGoal&&!isFinal&&!isHighlight&&!isRetroWide&&!isRetroSave)
                        lastHumanAttacking = !!(humanName && l.startsWith(humanName));

                    // Only display goals, 2 selected non-goal events, final score, highlights
                    const isSelected = _animNonGoal.has(_li);
                    if(!isGoal && !isFinal && !isHighlight && !(isNonGoalResult && isSelected)) continue;

                    viz.setMatchMinute(eventMeta.minute);

                    // Score bookkeeping
                    const prevHome = curHome, prevAway = curAway;
                    if (isGoal) {
                        const sg = l.match(/\((\d+)[–\-](\d+)\)/);
                        if (sg) { curHome=parseInt(sg[1]); curAway=parseInt(sg[2]); }
                        scoreEl.textContent = `${m.home} ${curHome} – ${curAway} ${m.away}`;
                    }
                    if (isHighlight) {
                        l.replace(/^Highlights:\s*/,"").replace(/\.$/,"").split(", ").forEach(part => {
                            const sp=part.lastIndexOf(" "); const name=part.substring(0,sp); const gn=parseInt(part.substring(sp+1));
                            if(!isNaN(gn)){ if(name===m.home) curHome=gn; else if(name===m.away) curAway=gn; }
                        });
                        scoreEl.textContent = `${m.home} ${curHome} – ${curAway} ${m.away}`;
                    }

                    // Animate
                    if (isGoal) {
                        const humanScored = humanIsHome ? curHome > prevHome : curAway > prevAway;
                        viz.setScore(curHome, curAway);
                        viz.goal(vizDir(humanScored));
                    } else if (isMiss) {
                        viz.setState(vizDir(lastHumanAttacking) ? "attack-human" : "attack-ai");
                        viz.noGoal(vizDir(lastHumanAttacking));
                    } else if (isSaved) {
                        viz.setState(vizDir(lastHumanAttacking) ? "attack-human" : "attack-ai");
                        viz.saved(vizDir(lastHumanAttacking));
                    } else if (isIntercept) {
                        viz.setState(vizDir(lastHumanAttacking) ? "attack-human" : "attack-ai");
                        viz.saved(vizDir(lastHumanAttacking));
                    } else if (isRetroWide) {
                        viz.noGoal(vizDir(lastHumanAttacking));
                    } else if (isRetroSave) {
                        viz.saved(vizDir(lastHumanAttacking));
                    } else if (isFinal) {
                        curHome = m.home_goals; curAway = m.away_goals;
                        scoreEl.textContent = `${m.home} ${curHome} – ${curAway} ${m.away}`;
                        viz.setState("full-time");
                        viz.clearBanner();
                        await delay(600);
                    }

                    // Show text line
                    const li = document.createElement("li");
                    const cls = reportLineClass(l);
                    if (cls) li.className = cls;
                    const minute = document.createElement("span");
                    minute.className = "match-minute";
                    minute.textContent = `${eventMeta.minute}'`;
                    const text = document.createElement("span");
                    text.textContent = l;
                    li.appendChild(minute); li.appendChild(text);
                    ul.appendChild(li);
                    li.scrollIntoView({ behavior: "smooth", block: "nearest" });

                    // Wait
                    if(!isFinal && !isHighlight) {
                        await viz.waitForAnim();
                        await delay(350);
                    }
                }

                if (financeLines.length) {
                    article.insertAdjacentHTML("beforeend", financeHtml(financeLines));
                }
            }

            const _canPlay = (state?.human_teams?.[0]?.lineup_size ?? 0) >= 1 && (state?.human_teams?.[0]?.lineup_size ?? 0) <= 11;
            document.getElementById("playRound").disabled = (state?.season_over ?? false) || !_canPlay;
        }

        // ── Canvas pitch visualiser ───────────────────────────────────────────
        class MatchVisualizer {
            constructor(id) {
                this.cv = document.getElementById(id);
                if (!this.cv) return;
                this.g = this.cv.getContext("2d");
                // Fit canvas to its CSS container so it fills the tall scoreboard
                const par = this.cv.parentElement;
                this.W = par.clientWidth  || 640;
                this.H = par.clientHeight || 420;
                this.cv.width = this.W; this.cv.height = this.H;
                this.homeTeam = ""; this.awayTeam = "";
                this.aiColor = "#111111";
                this.hg = 0; this.ag = 0;
                this.phase = 0;
                this.goalTick = 0; this.goalHuman = true;
                this._vs = "kickoff";
                // Parallelogram corners relative to canvas size
                this.C = {};
                this._corners();
                // Players in pitch coords (px=along pitch, py=across pitch 0=top 1=bottom)
                this.pl = [
                    {px:.08,py:.50,tpx:.08,tpy:.50,human:true,active:true},
                    {px:.38,py:.48,tpx:.38,tpy:.48,human:true,active:true},
                    {px:.62,py:.32,tpx:.62,tpy:.32,human:false,active:true},
                    {px:.68,py:.52,tpx:.68,tpy:.52,human:false,active:true},
                    {px:.62,py:.70,tpx:.62,tpy:.70,human:false,active:true},
                    {px:.76,py:.44,tpx:.76,tpy:.44,human:false,active:true},
                ];
                this._humanD=2; this._humanA=2;
                this.fmPl=[];
                this.bpx=.50; this.bpy=.50; this.btpx=.50; this.btpy=.50;
                this.bannType=null; this.bannTick=0; this.bannHuman=true;
                this.shotActive=false; this.shotStep=0.002; this.cornerCross=false; this._pending=null;
                this.shotStart=null; this.shotTraceTick=0;
                this.goalDelayTick=0;
                this.keeperSave=null; this.keeperTick=0;
                this.dribbleActive=false; this.dribbleTarget=null; this.dribbleStep=0.0009;
                this.passActive=false; this.passTarget=null; this.passStep=0.0015;
                this.wallReturnActive=false; this.wallReturnTarget=null;
                this.dribblerIdx=0; this.shooterIdx=0; this.passPlanned=false;
                this.kickTick=0; this.kickDuration=18;
                this._pendingBtpx=0; this._pendingBtpy=0;
                this._pendingResult=null; this._pendingKeeper=null; this._attackVs="attack-human";
                this._humanTeamAttacking=true;
                this._animComplete=true; this._animResolve=null;
                this.freeKickCurving=false; this._fkWallX=0; this._fkWallY=0.5; this._fkWallHit=false;
                this._penaltyKeeperY=0.50; this._penaltyBallY=0.50;
                this._raf=null; this._loop=this._loop.bind(this);
                this._raf=requestAnimationFrame(this._loop);
            }

            // Set parallelogram corners relative to current canvas size
            _corners() {
                const W=this.W, H=this.H;
                // Push pitch below the scoreboard (mh=68 + th=26 = 94px) with small margins
                const sb=98;
                const pitchH=Math.max(200, H-sb-6);
                const slant=pitchH/7;
                this.C.tl = {x:W*0.090, y:sb+slant};
                this.C.tr = {x:W*0.952, y:sb};
                this.C.bl = {x:W*0.108, y:sb+pitchH};
                const C=this.C;
                C.br = {x:C.bl.x+C.tr.x-C.tl.x, y:C.bl.y+C.tr.y-C.tl.y};
            }

            // Zoom disabled — full pitch always shown
            _setView(g) { }

            // Pitch coord (0..1) to screen coord
            _ps(px, py) {
                const {tl,tr,bl} = this.C;
                return {
                    x: tl.x + px*(tr.x-tl.x) + py*(bl.x-tl.x),
                    y: tl.y + px*(tr.y-tl.y) + py*(bl.y-tl.y)
                };
            }

            reset(home, away) {
                this.homeTeam=home; this.awayTeam=away;
                const _pal=["#111111","#cc2222","#cc0066","#884400","#aa22cc","#1155cc","#0099aa"];
                this.aiColor=_pal[Math.floor(Math.random()*_pal.length)];
                this.hg=0; this.ag=0; this._vs="kickoff";
                this.matchMinute=0; this._secondHalf=false;
                this.goalTick=0; this.bannType=null; this.bannTick=0;
                this.shotActive=false; this._pending=null;
                this.shotStart=null; this.shotTraceTick=0;
                this.goalDelayTick=0;
                this.keeperSave=null; this.keeperTick=0;
                this.dribbleActive=false; this.dribbleTarget=null;
                this.passActive=false; this.passTarget=null; this.passPlanned=false;
                this.attackVariant=0;
                this.kickTick=0;
                this._pendingResult=null; this._pendingKeeper=null;
                this._humanTeamAttacking=true;
                this._animComplete=true; this._animResolve=null;
                this._form("kickoff");
                this._hideOverlay();
            }

            setScore(h, a) { this.hg=h; this.ag=a; }
            setMatchMinute(m) {
                this.matchMinute=m|0;
                if(!this._secondHalf && this.matchMinute>=45 && this.fmPl.length){
                    this._secondHalf=true;
                    for(const p of this.fmPl){ p.fpx=1-p.fpx; p.tpx=1-p.tpx; p.px=1-p.px; }
                }
            }

            _shotOrigin(attackingRight) {
                return attackingRight
                    ? {px:.80+Math.random()*0.04, py:.40+Math.random()*0.20}
                    : {px:.20-Math.random()*0.04, py:.40+Math.random()*0.20};
            }

            _dribbleSetup(humanAttacking) {
                // humanAttacking = direction (true=going right); humanTeamAttacking = which team actually attacks
                const humanTeamAttacking = this._secondHalf ? !humanAttacking : humanAttacking;
                this._humanTeamAttacking = humanTeamAttacking;
                this._attackVs = humanAttacking ? "attack-human" : "attack-ai";
                this.setState(this._attackVs);
                this._animComplete=false; this._animResolve=null;
                this.goalTick=0; this.goalDelayTick=0; this.bannTick=0;
                this.shotActive=false; this.shotStep=0.002; this.cornerCross=false; this._pending=null;
                this.shotStart=null; this.shotTraceTick=0;
                this.keeperSave=null; this.keeperTick=0;
                this.kickTick=0;
                this.freeKickCurving=false; this._fkWallHit=false;
                this.passActive=false; this.passTarget=null;
                this.wallReturnActive=false; this.wallReturnTarget=null;
                this.passPlanned=false;
                this.dribblerIdx=humanAttacking?0:2;
                this.shooterIdx=this.dribblerIdx;

                const isCorner = Math.random() < 0.18;
                const isWallPass = !isCorner && Math.random() < 0.18;
                const isWingCross = !isCorner && !isWallPass && Math.random() < 0.20;
                const isFreeKick = !isCorner && !isWallPass && !isWingCross && Math.random() < 0.20;
                const isPenalty = !isCorner && !isWallPass && !isWingCross && !isFreeKick && Math.random() < 0.12;
                this.attackVariant = isCorner ? 3 : isWallPass ? 4 : isWingCross ? 5 : isFreeKick ? 6 : isPenalty ? 7 : Math.floor(Math.random()*3);

                if(isCorner){
                    // Ball starts at corner flag; long wind-up replaces dribble
                    const cornerY = Math.random()<0.5 ? 0.025 : 0.975;
                    this.bpx = humanAttacking ? 0.995 : 0.005;
                    this.bpy = cornerY;
                    this.dribbleActive = false;
                    this.kickTick = 30;
                    this.passTarget = {
                        px: humanAttacking ? 0.88+Math.random()*0.05 : 0.12-Math.random()*0.05,
                        py: 0.38+Math.random()*0.24
                    };
                    this.dribbleTarget = { px: this.bpx, py: this.bpy };
                } else {
                    this.dribbleActive = true;
                    // Ball starting position (same for all normal variants)
                    const ar=Math.random();
                    if(humanAttacking){
                        if(ar<0.45){this.bpx=0.60+Math.random()*0.06;this.bpy=0.38+Math.random()*0.24;}
                        else if(ar<0.75){this.bpx=0.74+Math.random()*0.07;this.bpy=0.32+Math.random()*0.36;}
                        else{this.bpx=0.70+Math.random()*0.08;this.bpy=Math.random()<0.5?0.04+Math.random()*0.10:0.86+Math.random()*0.10;}
                    } else {
                        if(ar<0.45){this.bpx=0.40-Math.random()*0.06;this.bpy=0.38+Math.random()*0.24;}
                        else if(ar<0.75){this.bpx=0.26-Math.random()*0.07;this.bpy=0.32+Math.random()*0.36;}
                        else{this.bpx=0.30-Math.random()*0.08;this.bpy=Math.random()<0.5?0.04+Math.random()*0.10:0.86+Math.random()*0.10;}
                    }
                    if(isWallPass){
                        // Wall pass (seinäsyöttö): give-and-go — same player passes then runs to receive
                        this.passPlanned=true;
                        this.shooterIdx=this.dribblerIdx;
                        const wallSide=(Math.random()<0.5?1:-1);
                        const wallX=humanAttacking?0.72+Math.random()*0.08:0.28-Math.random()*0.08;
                        const wallY=Math.max(0.33,Math.min(0.67,this.bpy+wallSide*(0.09+Math.random()*0.07)));
                        this.passTarget={px:wallX,py:wallY};
                        const retX=humanAttacking?wallX+0.09+Math.random()*0.07:wallX-0.09-Math.random()*0.07;
                        const retY=Math.max(0.35,Math.min(0.65,this.bpy+wallSide*0.03+(Math.random()-.5)*0.05));
                        this.wallReturnTarget={px:retX,py:retY};
                        this.dribbleTarget={
                            px:humanAttacking?wallX-0.07+Math.random()*0.04:wallX+0.07-Math.random()*0.04,
                            py:Math.max(0.35,Math.min(0.65,this.bpy*0.7+wallY*0.3))
                        };
                        } else if(isFreeKick){
                        // Free kick: static ball, wall, curling shot
                        // Randomize position: anywhere from ~22m out to edge of box, varied angle
                        const fkDist = 0.12 + Math.random() * 0.10; // distance from goal in pitch units
                        const fkAngle = (Math.random() - 0.5) * 0.40; // horizontal offset from center
                        this.bpx = humanAttacking ? 1.0 - fkDist - 0.03 : fkDist + 0.03;
                        this.bpy = 0.50 + fkAngle;
                        this.dribbleActive = false;
                        this.passPlanned = false;
                        this.kickTick = 55; // longer wind-up
                        this.dribbleTarget = { px: this.bpx, py: this.bpy };
                        // Wall position: between ball and goal, distance ~half of fkDist
                        this._fkWallX = humanAttacking ? this.bpx + fkDist * 0.5 : this.bpx - fkDist * 0.5;
                        this._fkWallY = this.bpy;
                        this.passTarget = { px: this._fkWallX, py: this._fkWallY };
                    } else if(isPenalty){
                        // Penalty: ball on spot, run-up, keeper dives
                        this.bpx=humanAttacking?0.878:0.122;
                        this.bpy=0.50;
                        this.dribbleActive=false; this.passPlanned=false;
                        this.kickTick=65; // run-up frames
                        this.dribbleTarget={px:this.bpx,py:this.bpy};
                        this._penaltyKeeperY=Math.random()<0.5?0.30:0.70;
                    } else if(isWingCross){
                        // Wing run: dribble down the flank to the byline, then cross into the box
                        this.passPlanned=true;
                        this.shooterIdx=humanAttacking?1:(Math.random()<0.5?3:4);
                        const wingTop=Math.random()<0.5;
                        const wingY=wingTop?0.05+Math.random()*0.08:0.87+Math.random()*0.08;
                        // Winger starts at midfield-flank position
                        this.bpx=humanAttacking?0.58+Math.random()*0.07:0.42-Math.random()*0.07;
                        this.bpy=wingY;
                        // Dribble target: near byline on the wing
                        const bylineX=humanAttacking?0.91+Math.random()*0.03:0.09-Math.random()*0.03;
                        this.dribbleTarget={px:bylineX, py:wingY};
                        // Cross target: into penalty area (shooter runs there to head/shoot)
                        this.passTarget={
                            px:humanAttacking?0.86+Math.random()*0.05:0.14-Math.random()*0.05,
                            py:0.40+Math.random()*0.20
                        };
                    } else {
                        this.passPlanned=Math.random()<0.38;
                        this.shooterIdx=this.passPlanned
                            ?(humanAttacking?1:(Math.random()<0.55?3:4))
                            :this.dribblerIdx;
                        this.passTarget=this._shotOrigin(humanAttacking);
                        this.dribbleTarget=this.passPlanned
                            ?{
                                px:humanAttacking?0.74+Math.random()*0.05:0.26-Math.random()*0.05,
                                py:Math.max(0.32,Math.min(0.68,this.passTarget.py+(Math.random()-.5)*0.16))
                            }
                            :this.passTarget;
                    }
                }

                // Snap dribbler player to ball start so they move together
                const dribIdx=this.dribblerIdx;
                if(this.pl[dribIdx]){
                    this.pl[dribIdx].px=this.bpx; this.pl[dribIdx].py=this.bpy;
                    this.pl[dribIdx].tpx=this.pl[dribIdx].px; this.pl[dribIdx].tpy=this.bpy;
                }
                // Snap fmPl attacker to ball start (no lerp lag)
                const fmSnapIdx=humanTeamAttacking?this._humanAttIdx:this._aiAttIdx;
                if(fmSnapIdx>=0&&this.fmPl[fmSnapIdx]){
                    this.fmPl[fmSnapIdx].px=this.bpx; this.fmPl[fmSnapIdx].py=this.bpy;
                    this.fmPl[fmSnapIdx].tpx=this.bpx; this.fmPl[fmSnapIdx].tpy=this.bpy;
                }
                // Random positional jitter so off-ball players don't stand in static formation rows
                for(const p of this.fmPl){
                    p.jx=(Math.random()-.5)*0.07;
                    p.jy=(Math.random()-.5)*0.10;
                }
                this._shapeAttack(humanAttacking);
            }

            _shapeAttack(humanAttacking) {
                const fwd=humanAttacking?0.018:-0.018;
                const j=(n)=> (Math.random()-.5)*n;
                if(this.passPlanned && this.pl[this.shooterIdx]) {
                    if(this.attackVariant===5){
                        // Wing cross: shooter runs into the penalty area to head the cross
                        const runX=humanAttacking?0.87+j(.04):0.13-j(.04);
                        this.pl[this.shooterIdx].tpx=Math.max(.72,Math.min(.96,runX));
                        this.pl[this.shooterIdx].tpy=this.passTarget.py+j(.08);
                    } else {
                        this.pl[this.shooterIdx].tpx=this.passTarget.px-fwd;
                        this.pl[this.shooterIdx].tpy=this.passTarget.py;
                    }
                }
                if(humanAttacking) {
                    if(this.pl[1] && this.shooterIdx!==1){
                        this.pl[1].tpx=.81+j(.05);
                        this.pl[1].tpy=(this.attackVariant === 0 ? .58 : this.attackVariant === 1 ? .42 : this.attackVariant === 5 ? .50 : .66)+j(.06);
                    }
                    [
                        [2,.72+j(.05),.30+j(.08)],
                        [3,.80+j(.04),this.bpy+j(.10)],
                        [4,.75+j(.05),.70+j(.08)]
                    ].forEach(([i,px,py])=>{
                        if(this.pl[i]){this.pl[i].tpx=Math.max(.64,Math.min(.88,px));this.pl[i].tpy=Math.max(.22,Math.min(.78,py));}
                    });
                } else {
                    if(this.pl[3] && this.shooterIdx!==3){
                        this.pl[3].tpx=.19+j(.05);
                        this.pl[3].tpy=(this.attackVariant === 0 ? .58 : this.attackVariant === 1 ? .42 : .66)+j(.06);
                    }
                    if(this.pl[4] && this.shooterIdx!==4){
                        this.pl[4].tpx=.23+j(.04);
                        this.pl[4].tpy=(this.attackVariant === 2 ? .62 : .70)+j(.06);
                    }
                    [
                        [0,.28+j(.05),.30+j(.08)],
                        [1,.20+j(.04),this.bpy+j(.10)]
                    ].forEach(([i,px,py])=>{
                        if(this.pl[i]){this.pl[i].tpx=Math.max(.12,Math.min(.36,px));this.pl[i].tpy=Math.max(.22,Math.min(.78,py));}
                    });
                }
            }

            _moveOffBall() {
                if(this._vs!=="attack-human" && this._vs!=="attack-ai") return;
                const humanAttacking=this._vs==="attack-human";
                const fwd=humanAttacking?0.018:-0.018;
                const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
                const wob=Math.sin(this.phase*1.7)*0.018;
                const supportY=clamp(this.bpy + (this.attackVariant===1 ? -0.16 : this.attackVariant===2 ? 0.16 : 0.10) + wob, .26, .74);
                const supportPx=humanAttacking ? clamp(this.bpx+.08,.72,.86) : clamp(this.bpx-.08,.14,.28);
                const supportIdx=humanAttacking?1:3;
                if(this.pl[supportIdx] && supportIdx!==this.dribblerIdx && supportIdx!==this.shooterIdx) {
                    this.pl[supportIdx].tpx=supportPx;
                    this.pl[supportIdx].tpy=supportY;
                }
                if(this.pl[this.shooterIdx] && this.shooterIdx!==this.dribblerIdx) {
                    this.pl[this.shooterIdx].tpx=(this.passTarget?.px ?? this.bpx)-fwd;
                    this.pl[this.shooterIdx].tpy=this.passTarget?.py ?? this.bpy;
                }
                const defenders=humanAttacking ? [2,3,4] : [0,1,4];
                defenders.forEach((idx,n)=>{
                    if(!this.pl[idx]) return;
                    if(idx===this.dribblerIdx || idx===this.shooterIdx) return;
                    const stagger=(n-1)*0.12;
                    const coverX=humanAttacking
                        ? clamp(this.bpx+.055+n*.035,.66,.90)
                        : clamp(this.bpx-.055-n*.035,.10,.34);
                    const coverY=clamp(this.bpy+stagger+wob*(n+1),.24,.76);
                    this.pl[idx].tpx=coverX;
                    this.pl[idx].tpy=coverY;
                });
            }

            goal(humanScored) {
                this.goalHuman=this._secondHalf?!humanScored:humanScored; this.bannType=null;
                this._dribbleSetup(humanScored);
                this._pendingBtpx=humanScored?0.994:0.006;
                this._pendingBtpy=0.40+Math.random()*0.20;
                this._pendingResult="goal"; this._pendingKeeper=null;
            }

            noGoal(humanMissed) {
                this.bannType="nogoal"; this.bannHuman=this._secondHalf?!humanMissed:humanMissed;
                this._dribbleSetup(humanMissed);
                const r=Math.random(), gpx=humanMissed?1.02:-0.02;
                if(r<0.33){ this._pendingBtpx=gpx; this._pendingBtpy=0.24+Math.random()*0.08; }
                else if(r<0.66){ this._pendingBtpx=gpx; this._pendingBtpy=0.68+Math.random()*0.08; }
                else{ this._pendingBtpx=gpx; this._pendingBtpy=0.28+Math.random()*0.06; }
                this._pendingResult="nogoal"; this._pendingKeeper=null;
            }

            saved(humanAttacking) {
                const humanTeamAtt=this._secondHalf?!humanAttacking:humanAttacking;
                this.bannType="saved"; this.bannHuman=humanTeamAtt;
                this._dribbleSetup(humanAttacking);
                const kpx=humanAttacking?0.93+Math.random()*0.02:0.07-Math.random()*0.02;
                const kpy=0.38+Math.random()*0.24;
                const kFrom=humanAttacking?0.91:0.09;
                this._pendingBtpx=kpx; this._pendingBtpy=kpy;
                this._pendingResult="saved";
                this._pendingKeeper={fromPx:kFrom, fromPy:0.50, px:kpx, py:kpy, human:!humanTeamAtt};
            }

            clearBanner() {
                this.bannType=null; this.bannTick=0; this.goalTick=0;
                this.shotActive=false; this._pending=null;
                this.shotStart=null; this.shotTraceTick=0;
                this.goalDelayTick=0;
                this.keeperSave=null; this.keeperTick=0;
                this.dribbleActive=false; this.dribbleTarget=null;
                this.passActive=false; this.passTarget=null; this.passPlanned=false;
                this.attackVariant=0;
                this.kickTick=0;
                this._pendingResult=null; this._pendingKeeper=null;
                this._signalAnimDone();
                this._hideOverlay();
            }

            _signalAnimDone() {
                this._animComplete=true;
                if(this._animResolve){ this._animResolve(); this._animResolve=null; }
            }

            // Returns a promise that resolves when the current attack animation fully displays its result.
            waitForAnim(maxMs=18000) {
                if(this._animComplete) return Promise.resolve();
                return new Promise(r=>{
                    this._animResolve=r;
                    setTimeout(()=>{ if(this._animResolve===r){ this._animResolve=null; r(); } }, maxMs);
                });
            }

            setState(name) { this._vs=name; this._form(name); if(name==="kickoff"||name==="full-time"){this.bpx=this.btpx;this.bpy=this.btpy;} }
            setHumanFormation(d, a) { this._humanD=Math.max(0,d|0); this._humanA=Math.max(1,a|0); }

            setSecondHalf() {
                if(this._secondHalf) return;
                this._secondHalf=true;
                this.fmPl.forEach(p=>{ p.fpx=1-p.fpx; p.px=1-p.px; p.tpx=1-p.tpx; });
            }

            setFullFormation(hD, hM, hA) {
                const fm=[];
                const spread=(n,x,human,role)=>{
                    if(n<=0) return;
                    const ys=n===1?[.50]:n===2?[.36,.64]:n===3?[.28,.50,.72]:n===4?[.22,.40,.60,.78]:
                        n===5?[.18,.32,.50,.68,.82]:Array.from({length:n},(_,i)=>0.15+(0.70/Math.max(1,n-1))*i);
                    ys.forEach(py=>fm.push({px:x,py,tpx:x,tpy:py,human,role}));
                };
                // Show actual active players — no padding to 11
                let d=hD|0, m=hM|0, a=hA|0;
                // First available player becomes GK
                if(d>0){fm.push({px:.03,py:.50,tpx:.03,tpy:.50,human:true,isGK:true,role:'G'});d--;}
                else if(m>0){fm.push({px:.03,py:.50,tpx:.03,tpy:.50,human:true,isGK:true,role:'G'});m--;}
                else if(a>0){fm.push({px:.03,py:.50,tpx:.03,tpy:.50,human:true,isGK:true,role:'G'});a--;}
                spread(d,.14,true,'D'); spread(m,.31,true,'M'); spread(a,.49,true,'A');
                // AI: 1 GK + 4D + 4M + 2A = 11
                fm.push({px:.97,py:.50,tpx:.97,tpy:.50,human:false,isGK:true,role:'G'});
                spread(4,.86,false,'D'); spread(4,.69,false,'M'); spread(2,.51,false,'A');
                this.fmPl=fm.map(p=>({px:p.px,py:p.py,tpx:p.tpx,tpy:p.tpy,fpx:p.px,fpy:p.py,human:p.human,isGK:p.isGK||false,role:p.role||'D'}));
                const hIdxs=this.fmPl.map((p,i)=>p.human&&!p.isGK?i:-1).filter(i=>i>=0);
                const aIdxs=this.fmPl.map((p,i)=>!p.human&&!p.isGK?i:-1).filter(i=>i>=0);
                this._humanAttIdx=hIdxs[hIdxs.length-1]??-1;
                this._humanSupportIdx=hIdxs[hIdxs.length-2]??-1;
                this._aiAttIdx=aIdxs[aIdxs.length-1]??-1;
                this._aiSupportIdx=aIdxs[aIdxs.length-2]??-1;
            }

            _form(name) {
                const F = {
                    kickoff:[{h:[{px:.08,py:.50},{px:.38,py:.48}],a:[{px:.62,py:.32},{px:.68,py:.52},{px:.62,py:.70},{px:.76,py:.44}],b:{px:.50,py:.50}}],
                    "attack-human":[
                        {h:[{px:.74,py:.52},{px:.86,py:.42}],a:[{px:.70,py:.30},{px:.76,py:.54},{px:.72,py:.72},{px:.90,py:.48}],b:{px:.86,py:.46}},
                        {h:[{px:.76,py:.44},{px:.88,py:.56}],a:[{px:.70,py:.26},{px:.78,py:.58},{px:.74,py:.72},{px:.91,py:.40}],b:{px:.88,py:.52}},
                        {h:[{px:.72,py:.58},{px:.84,py:.38}],a:[{px:.68,py:.34},{px:.78,py:.50},{px:.72,py:.66},{px:.90,py:.44}],b:{px:.84,py:.40}},
                    ],
                    "attack-ai":[
                        {h:[{px:.26,py:.55},{px:.18,py:.46}],a:[{px:.28,py:.28},{px:.22,py:.52},{px:.26,py:.70},{px:.10,py:.48}],b:{px:.16,py:.55}},
                        {h:[{px:.24,py:.60},{px:.16,py:.44}],a:[{px:.30,py:.24},{px:.22,py:.56},{px:.28,py:.74},{px:.09,py:.40}],b:{px:.14,py:.48}},
                        {h:[{px:.28,py:.50},{px:.18,py:.58}],a:[{px:.32,py:.32},{px:.22,py:.50},{px:.28,py:.68},{px:.10,py:.44}],b:{px:.16,py:.60}},
                    ],
                    "full-time":[{h:[{px:.40,py:.52},{px:.52,py:.46}],a:[{px:.52,py:.38},{px:.60,py:.54},{px:.54,py:.68},{px:.62,py:.44}],b:{px:.50,py:.50}}],
                };
                const arr=F[name]||F["kickoff"];
                const f=arr[Math.floor(Math.random()*arr.length)];
                f.h.forEach((p,i)=>{if(this.pl[i]){this.pl[i].tpx=p.px;this.pl[i].tpy=p.py;}});
                f.a.forEach((p,i)=>{if(this.pl[2+i]){this.pl[2+i].tpx=p.px;this.pl[2+i].tpy=p.py;}});
                // Goalkeeper (pl[5]): defending team's color; reset to black for non-attack views
                if(name==="attack-ai")    this.pl[5].human=true;
                else                      this.pl[5].human=false;
                this.btpx=f.b.px; this.btpy=f.b.py;
                // Formation-based player visibility
                this.pl.forEach(p=>p.active=true);
                if(name==="attack-human") {
                    // Human attacks: show 1 attacker if hA<=1, else 2
                    if(this._humanA<=1) this.pl[1].active=false;
                } else if(name==="attack-ai") {
                    // Human defends: 0D→keeper only, 1D→1 defender+keeper, 2+D→both
                    if(this._humanD===0){ this.pl[0].active=false; this.pl[1].active=false; }
                    else if(this._humanD===1){ this.pl[0].active=false; }
                }
            }

            _loop(t) {
                this._raf=requestAnimationFrame(this._loop);
                this.phase=(t*0.003)%(Math.PI*2);
                const sp=0.07;
                for(const p of this.pl){p.px+=(p.tpx-p.px)*sp;p.py+=(p.tpy-p.py)*sp;}
                // fmPl sync: freeze in place during result banner so players don't drift
                // back to formation while the save/miss/goal result is still showing
                const _frozen = this.bannTick > 0 || this.goalDelayTick > 0;
                if(_frozen) {
                    for(const p of this.fmPl){p.tpx=p.px;p.tpy=p.py;}
                } else {
                    for(const p of this.fmPl){p.tpx=p.fpx+(p.jx||0);p.tpy=p.fpy+(p.jy||0);}
                }
                if(this._vs==="attack-human"||this._vs==="attack-ai"){
                    const humanAtt=this._vs==="attack-human"; // direction: true=going right
                    const hTA=this._humanTeamAttacking;       // which team actually attacks
                    if(this.dribbleActive||this.passActive||this.wallReturnActive||this.kickTick>0){
                        const fi=hTA?this._humanAttIdx:this._aiAttIdx;
                        const carrier=fi>=0?this.fmPl[fi]:null;
                        const plC=this.pl[this.dribblerIdx];
                        if(carrier&&plC){carrier.tpx=plC.tpx;carrier.tpy=plC.tpy;}
                        // Support player follows shooter on pass plays
                        if(this.passPlanned&&this.shooterIdx!==this.dribblerIdx){
                            const si=hTA?this._humanSupportIdx:this._aiSupportIdx;
                            const support=si>=0?this.fmPl[si]:null;
                            const plS=this.pl[this.shooterIdx];
                            if(support&&plS){support.tpx=plS.tpx;support.tpy=plS.tpy;}
                        }
                        // Wall pass: show the wall player at passTarget position
                        if(this.attackVariant===4&&(this.passActive||this.wallReturnActive)){
                            const wi=hTA?this._humanSupportIdx:this._aiSupportIdx;
                            const wallFm=wi>=0?this.fmPl[wi]:null;
                            if(wallFm){wallFm.tpx=this.passTarget.px;wallFm.tpy=this.passTarget.py;}
                        }
                    } else if(this.shotActive&&this.shotStart){
                        // Shooter stays at kick origin while ball is in flight
                        const fi=hTA?this._humanAttIdx:this._aiAttIdx;
                        const carrier=fi>=0?this.fmPl[fi]:null;
                        if(carrier){carrier.tpx=this.shotStart.px;carrier.tpy=this.shotStart.py;}
                        if(this.passPlanned&&this.shooterIdx!==this.dribblerIdx){
                            const si=hTA?this._humanSupportIdx:this._aiSupportIdx;
                            const support=si>=0?this.fmPl[si]:null;
                            if(support){support.tpx=this.shotStart.px;support.tpy=this.shotStart.py;}
                        }
                    }
                    // Defending fmPl converge toward ball path during dribble/pass
                    if((this.dribbleActive||this.passActive)&&this.attackVariant!==3&&this.attackVariant!==6&&this.attackVariant!==7){
                        const _cl=(v,a,b)=>Math.max(a,Math.min(b,v));
                        const intX=humanAtt
                            ?_cl(this.bpx+0.09,0.30,0.88)
                            :_cl(this.bpx-0.09,0.12,0.70);
                        const defFm=this.fmPl
                            .filter(p=>!p.isGK&&p.human!==hTA)
                            .sort((a,b)=>humanAtt?b.fpx-a.fpx:a.fpx-b.fpx);
                        defFm.slice(0,2).forEach((p,i)=>{
                            p.tpx=intX;
                            p.tpy=_cl(this.bpy+(i===0?0.07:-0.07),0.25,0.75);
                        });
                        defFm.slice(2,5).forEach(p=>{
                            const ownGoal=humanAtt?0.05:0.95;
                            p.tpx=_cl(p.fpx*0.55+ownGoal*0.45,0.06,0.94);
                            p.tpy=p.fpy*0.6+this.bpy*0.4;
                        });
                    }
                }
                // Goal celebration: cluster human players near goal
                if(this.goalTick>0&&this.goalHuman){
                    let ci=0;
                    for(const p of this.fmPl){
                        if(p.human&&!p.isGK){
                            p.tpx=Math.max(0.01,this.btpx-0.08)+(ci%3-1)*0.025;
                            p.tpy=0.38+Math.floor(ci/3)*0.12;
                            ci++;
                        }
                    }
                }
                // Penalty: keeper dives during shot
                if(this.attackVariant===7&&this.shotActive){
                    const hTA=this._humanTeamAttacking;
                    for(const p of this.fmPl){
                        if(p.isGK&&p.human!==hTA){
                            p.tpy=this._penaltyKeeperY;
                        }
                    }
                }
                // Free kick: wall + kicker positioning
                if(this.attackVariant===6&&(this.kickTick>0||this.shotActive)){
                    const hAtt=this._vs==="attack-human"; // direction
                    const hTA=this._humanTeamAttacking;   // actual team
                    const kickerIdx=hTA?this._humanAttIdx:this._aiAttIdx;
                    // Kicker stays at ball position
                    if(kickerIdx>=0&&this.fmPl[kickerIdx]){
                        this.fmPl[kickerIdx].tpx=this.bpx; this.fmPl[kickerIdx].tpy=this.bpy;
                    }
                    // Defending team: 3-4 players form a wall
                    const wallDefenders=this.fmPl.filter(p=>!p.isGK&&p.human!==hTA).slice(0,4);
                    wallDefenders.forEach((p,i)=>{
                        p.tpx=this._fkWallX;
                        p.tpy=this._fkWallY+(i-1.5)*0.055;
                    });
                    // Attacking outfield (non-kicker): spread at edge of box ready for rebound
                    let ai=0;
                    for(let pi=0;pi<this.fmPl.length;pi++){
                        const p=this.fmPl[pi];
                        if(!p.isGK&&p.human===hTA&&pi!==kickerIdx){
                            const rebX=hAtt?0.84+ai*0.03:0.16-ai*0.03;
                            p.tpx=Math.max(0.06,Math.min(0.94,rebX));
                            p.tpy=0.38+ai*0.08;
                            ai++;
                        }
                    }
                }
                // Corner kick: cluster outfield players in penalty area
                if(this.attackVariant===3&&(this.kickTick>0||this.shotActive)){
                    const hAtt=this._vs==="attack-human"; // direction
                    const hTA=this._humanTeamAttacking;   // actual team
                    const sign=hAtt?1:-1;
                    const boxNear=hAtt?0.89:0.11; // near post x
                    const kickerIdx=hTA?this._humanAttIdx:this._aiAttIdx;
                    // Attacking mids+fwds: spread organically across the box using per-player jitter
                    const attBoxYs=[0.38,0.44,0.50,0.56,0.62,0.41,0.47,0.53,0.59];
                    let boxI=0, covI=0;
                    for(let pi=0;pi<this.fmPl.length;pi++){
                        const p=this.fmPl[pi];
                        if(!p.isGK&&p.human===hTA&&pi!==kickerIdx){
                            if(p.role==='D'){
                                // Defenders hold midfield against counter
                                p.tpx=hAtt?0.46+covI*0.07:0.54-covI*0.07;
                                p.tpy=0.30+covI*0.20+(p.jy||0)*0.5;
                                covI++;
                            } else {
                                // Spread irregularly using jitter to break grid look
                                const bx=boxNear-(boxI*0.055+0.02)*sign;
                                p.tpx=Math.max(0.06,Math.min(0.94,bx+(p.jx||0)*0.6));
                                p.tpy=Math.max(0.30,Math.min(0.70,attBoxYs[boxI%attBoxYs.length]+(p.jy||0)*0.5));
                                boxI++;
                            }
                        }
                    }
                    // Defending team: face the cross in a less rigid spread
                    let di=0;
                    for(const p of this.fmPl){
                        if(!p.isGK&&p.human!==hTA){
                            const dx=boxNear-(di*0.04+0.01)*sign;
                            p.tpx=Math.max(0.06,Math.min(0.94,dx+(p.jx||0)*0.5));
                            p.tpy=Math.max(0.28,Math.min(0.72,0.36+(di%8)*0.048+(p.jy||0)*0.4));
                            di++;
                        }
                    }
                }
                for(const p of this.fmPl){p.px+=(p.tpx-p.px)*sp;p.py+=(p.tpy-p.py)*sp;}
                if(this.dribbleActive) {
                    // Phase 1: slow dribble — dribbler player tracks the ball
                    this._moveOffBall();
                    const dribIdx=this.dribblerIdx;
                    const dribOscil=Math.max(0,Math.sin(this.phase*8))*0.007;
                    const fwd=this._vs==="attack-ai"?-dribOscil:dribOscil;
                    if(this.pl[dribIdx]){this.pl[dribIdx].tpx=this.bpx-fwd;this.pl[dribIdx].tpy=this.bpy;this.pl[dribIdx].px=this.bpx-fwd;this.pl[dribIdx].py=this.bpy;}
                    const dx=this.dribbleTarget.px-this.bpx, dy=this.dribbleTarget.py-this.bpy;
                    const dist=Math.sqrt(dx*dx+dy*dy);
                    if(dist<=this.dribbleStep) {
                        this.bpx=this.dribbleTarget.px; this.bpy=this.dribbleTarget.py;
                        this.dribbleActive=false;
                        if(this.passPlanned) {
                            this.passActive=true;
                        } else {
                            this.kickTick=this.kickDuration;
                        }
                    } else {
                        this.bpx+=(dx/dist)*this.dribbleStep;
                        this.bpy+=(dy/dist)*this.dribbleStep;
                    }
                } else if(this.passActive) {
                    this._moveOffBall();
                    const fwd=this._vs==="attack-ai"?-0.02:0.02;
                    if(this.attackVariant===4){
                        // Wall pass: dribbler runs to return position while ball travels to wall
                        if(this.pl[this.dribblerIdx]){
                            this.pl[this.dribblerIdx].tpx=this.wallReturnTarget.px;
                            this.pl[this.dribblerIdx].tpy=this.wallReturnTarget.py;
                        }
                    } else if(this.pl[this.shooterIdx]){
                        this.pl[this.shooterIdx].tpx=this.passTarget.px-fwd;
                        this.pl[this.shooterIdx].tpy=this.passTarget.py;
                    }
                    const dx=this.passTarget.px-this.bpx, dy=this.passTarget.py-this.bpy;
                    const dist=Math.sqrt(dx*dx+dy*dy);
                    if(dist<=this.passStep) {
                        this.bpx=this.passTarget.px; this.bpy=this.passTarget.py;
                        this.passActive=false;
                        if(this.attackVariant===4) {
                            this.wallReturnActive=true;
                        } else {
                            this.kickTick=this.kickDuration;
                        }
                    } else {
                        this.bpx+=(dx/dist)*this.passStep;
                        this.bpy+=(dy/dist)*this.passStep;
                    }
                } else if(this.wallReturnActive) {
                    // Wall player returns the ball to the dribbler's run-in position
                    this._moveOffBall();
                    if(this.pl[this.dribblerIdx]){
                        this.pl[this.dribblerIdx].tpx=this.wallReturnTarget.px;
                        this.pl[this.dribblerIdx].tpy=this.wallReturnTarget.py;
                        this.pl[this.dribblerIdx].px=this.wallReturnTarget.px;
                        this.pl[this.dribblerIdx].py=this.wallReturnTarget.py;
                    }
                    const dx=this.wallReturnTarget.px-this.bpx, dy=this.wallReturnTarget.py-this.bpy;
                    const dist=Math.sqrt(dx*dx+dy*dy);
                    const retStep=this.passStep*1.5;
                    if(dist<=retStep){
                        this.bpx=this.wallReturnTarget.px; this.bpy=this.wallReturnTarget.py;
                        this.wallReturnActive=false;
                        this.kickTick=this.kickDuration;
                    } else {
                        this.bpx+=(dx/dist)*retStep;
                        this.bpy+=(dy/dist)*retStep;
                    }
                } else if(this.kickTick>0) {
                    if(this.attackVariant!==6) this._moveOffBall();
                    const dribIdx=this.attackVariant===6?this.dribblerIdx:this.shooterIdx;
                    const dribOscil=Math.max(0,Math.sin(this.phase*8))*0.007;
                    const fwd=this._vs==="attack-ai"?-dribOscil:dribOscil;
                    if(this.pl[dribIdx]){this.pl[dribIdx].tpx=this.bpx-fwd;this.pl[dribIdx].tpy=this.bpy;this.pl[dribIdx].px=this.bpx-fwd;this.pl[dribIdx].py=this.bpy;}
                    this.kickTick--;
                    if(this.kickTick===0) this._launchShot();
                } else if(this.shotActive) {
                    // Phase 2: fast shot toward target
                    const dx=this.btpx-this.bpx, dy=this.btpy-this.bpy;
                    const dist=Math.sqrt(dx*dx+dy*dy);
                    if(dist<=this.shotStep) {
                        this.bpx=this.btpx; this.bpy=this.btpy;
                        this.shotActive=false;
                        if(this.cornerCross) {
                            // Cross arrived in box — launch header/shot toward final target
                            this.cornerCross=false;
                            this.shotStart={px:this.bpx, py:this.bpy};
                            this.shotTraceTick=100;
                            this.btpx=this._pendingBtpx; this.btpy=this._pendingBtpy;
                            this.shotStep=0.0035;
                            this.shotActive=true;
                        } else if(this._fkWallHit) {
                            // Free kick hit the wall — ball deflects, result is miss
                            this._fkWallHit=false;
                            this.bannTick=100+Math.floor(Math.random()*20);
                            this._pending=null;
                        } else if(this.freeKickCurving) {
                            // Free kick cleared the wall — now flies toward goal/keeper
                            this.freeKickCurving=false;
                            this.shotStart={px:this.bpx, py:this.bpy};
                            this.shotTraceTick=120;
                            this.btpx=this._pendingBtpx; this.btpy=this._pendingBtpy;
                            this.shotStep=0.0025;
                            this.shotActive=true;
                        } else {
                            if(this._pending==="goal") this.goalDelayTick=20;
                            else if(this._pending==="nogoal") this.bannTick=100+Math.floor(Math.random()*20);
                            else if(this._pending==="saved") {
                                this.bannTick=110+Math.floor(Math.random()*20);
                                this.keeperTick=this.bannTick;
                            }
                            this._pending=null;
                        }
                    } else {
                        this.bpx+=(dx/dist)*this.shotStep;
                        this.bpy+=(dy/dist)*this.shotStep;
                    }
                } else {
                    this.bpx+=(this.btpx-this.bpx)*0.07; this.bpy+=(this.btpy-this.bpy)*0.07;
                }
                if(this.goalDelayTick>0) {
                    this.goalDelayTick--;
                    if(this.goalDelayTick===0) this.goalTick=150+Math.floor(Math.random()*20);
                }
                if(this.goalTick>0){ this.goalTick--; if(this.goalTick===0) this._signalAnimDone(); }
                if(this.bannTick>0){ this.bannTick--; if(this.bannTick===0) this._signalAnimDone(); }
                if(this.shotTraceTick>0)this.shotTraceTick--;
                else if(!this.shotActive) this.shotStart=null;
                if(this.keeperTick>0)this.keeperTick--;
                else if(!this.shotActive && this._pending!=="saved") this.keeperSave=null;
                this._draw();
            }

            _launchShot() {
                if(this.attackVariant===3 && !this.cornerCross) {
                    // Corner: cross into box first, then header/clearance in second phase
                    this.cornerCross=true;
                    this.btpx=this.passTarget.px;
                    this.btpy=this.passTarget.py;
                } else if(this.attackVariant===7) {
                    // Penalty kick
                    const hAtt=this._vs==="attack-human";
                    const goalX=hAtt?0.982:0.018;
                    const keeperY=this._penaltyKeeperY;
                    if(this._pendingResult==="goal"){
                        // Ball goes to the opposite corner from where keeper dives
                        this.btpx=goalX;
                        this.btpy=keeperY<0.50?0.68:0.32;
                    } else if(this._pendingResult==="saved"){
                        // Ball goes toward keeper's corner
                        this.btpx=goalX;
                        this.btpy=keeperY;
                        if(this._pendingResult==="saved"){
                            this.keeperSave=this._pendingKeeper; this.keeperTick=0;
                        }
                    } else {
                        // Miss: wide or over the bar
                        this.btpx=hAtt?1.04:-0.04;
                        this.btpy=keeperY<0.50?0.25:0.75;
                    }
                    this.shotStep=0.003;
                } else if(this.attackVariant===6) {
                    // Free kick: wall hit or curling shot
                    const hitsWall = this._pendingResult==="nogoal" && Math.random()<0.38;
                    if(hitsWall){
                        // Ball goes straight into the wall
                        this._fkWallHit=true;
                        this.btpx=this._fkWallX;
                        this.btpy=this._fkWallY+(Math.random()-0.5)*0.08;
                    } else {
                        // Curls around wall — phase 1: waypoint beside wall
                        this.freeKickCurving=true;
                        const curveDir=Math.random()<0.5?1:-1;
                        const hAtt=this._vs==="attack-human";
                        this.btpx=this._fkWallX+(hAtt?0.04:-0.04);
                        this.btpy=this._fkWallY+curveDir*(0.11+Math.random()*0.05);
                    }
                    this.shotStep=0.0022;
                } else {
                    this.btpx=this._pendingBtpx; this.btpy=this._pendingBtpy;
                }
                this.shotStart={px:this.bpx, py:this.bpy};
                this.shotTraceTick=180;
                if(this._pendingResult==="saved") {
                    this.keeperSave=this._pendingKeeper; this.keeperTick=0;
                }
                this._pending=this._pendingResult;
                this._pendingResult=null;
                this.shotActive=true;
            }

            _lp(pts) {
                const g=this.g; g.beginPath();
                pts.forEach((p,i)=>{const s=this._ps(p[0],p[1]);i?g.lineTo(s.x,s.y):g.moveTo(s.x,s.y);});
                g.stroke();
            }

            _ell(cx,cy,rw,rh) {
                const g=this.g; g.beginPath();
                for(let i=0;i<=40;i++){const a=(i/40)*Math.PI*2;const s=this._ps(cx+Math.cos(a)*rw,cy+Math.sin(a)*rh);i?g.lineTo(s.x,s.y):g.moveTo(s.x,s.y);}
                g.closePath(); g.stroke();
            }

            _parc(cx,cy,rw,rh,a0,a1) {
                const g=this.g,n=20; g.beginPath();
                for(let i=0;i<=n;i++){const a=a0+(a1-a0)*(i/n);const s=this._ps(cx+Math.cos(a)*rw,cy+Math.sin(a)*rh);i?g.lineTo(s.x,s.y):g.moveTo(s.x,s.y);}
                g.stroke();
            }

            _shotArc() {
                if(!this.shotStart || (!this.shotActive && this.shotTraceTick<=0)) return;
                const g=this.g;
                const sx=this.shotStart.px, sy=this.shotStart.py;
                const ex=this.shotActive?this.bpx:this.btpx, ey=this.shotActive?this.bpy:this.btpy;
                const dx=ex-sx, dy=ey-sy;
                const bend=0.035;
                g.save();
                g.strokeStyle="#f7f15b";
                g.lineWidth=2.2;
                g.setLineDash([5,4]);
                g.beginPath();
                for(let i=0;i<=24;i++){
                    const t=i/24;
                    const px=sx+dx*t;
                    const py=sy+dy*t + Math.sin(Math.PI*t)*bend*(dx>=0?-1:1);
                    const p=this._ps(px,py);
                    i?g.lineTo(p.x,p.y):g.moveTo(p.x,p.y);
                }
                g.stroke();
                g.restore();
            }

            _drawGoal(isHome) {
                const g=this.g, py1=0.36, py2=0.64, gh=22;
                const px=isHome?0:1;
                const p1=this._ps(px,py1), p2=this._ps(px,py2);
                g.save();
                g.strokeStyle="#ffff00"; g.lineWidth=2.2;
                g.lineCap="round"; g.lineJoin="round";
                g.beginPath();
                g.moveTo(p1.x,p1.y); g.lineTo(p1.x,p1.y-gh);
                g.moveTo(p2.x,p2.y); g.lineTo(p2.x,p2.y-gh);
                g.moveTo(p1.x,p1.y-gh); g.lineTo(p2.x,p2.y-gh);
                g.stroke();
                g.restore();
            }

            _apv(px, py) { const p=this._ap(px,py); return [p.x,p.y]; }

            _ap(px, py) {
                const right=this._vs!=="attack-ai";
                const r=this._attackRect();
                const xNorm=right
                    ? (px-.64)/.38    // human: goal at px=1 → right side
                    : (px+.02)/.38;   // AI: goal at px=0 → left side (true mirror)
                const x=r.x + Math.max(-.08,Math.min(1.08,xNorm))*r.w;
                const y=r.y + (.08+py*.84)*r.h;
                return {x,y};
            }

            _attackRect() {
                const aspect=1.30;
                const h=this.H;
                const w=Math.min(this.W, h*aspect);
                return {x:(this.W-w)/2, y:0, w, h};
            }

            _attackPoint(x, y) {
                const r=this._attackRect();
                return {x:r.x+x*r.w,y:r.y+y*r.h};
            }

            _attackLine(points) {
                const g=this.g;
                g.beginPath();
                points.forEach(([x,y],i)=>{
                    const p=this._attackPoint(x,y);
                    i?g.lineTo(p.x,p.y):g.moveTo(p.x,p.y);
                });
                g.stroke();
            }

            _attackCurve(points) {
                const g=this.g;
                if(points.length<2) return;
                const first=this._attackPoint(points[0][0],points[0][1]);
                g.beginPath();
                g.moveTo(first.x,first.y);
                for(let i=1;i<points.length;i+=2) {
                    const c=this._attackPoint(points[i][0],points[i][1]);
                    const end=points[i+1] ? this._attackPoint(points[i+1][0],points[i+1][1]) : c;
                    g.quadraticCurveTo(c.x,c.y,end.x,end.y);
                }
                g.stroke();
            }

            _attackGoal() {
                const g=this.g;
                const P=(x,y)=>this._attackPoint(x,y);
                const leftTop = P(.80,.90);
                const rightTop = P(.88,.91);
                const leftBottom = {x:leftTop.x, y:leftTop.y + this._attackRect().h * 0.06};
                const rightBottom = {x:rightTop.x, y:rightTop.y + this._attackRect().h * 0.06};
                g.save();
                g.strokeStyle="#ffff00";
                g.lineWidth=Math.max(2.5, this._attackRect().w*0.0045);
                g.lineJoin="round";
                g.lineCap="round";
                g.beginPath();
                // Simple goal posts and crossbar on the back line.
                g.moveTo(leftTop.x,leftTop.y); g.lineTo(rightTop.x,rightTop.y);
                g.moveTo(leftTop.x,leftTop.y); g.lineTo(leftBottom.x,leftBottom.y);
                g.moveTo(rightTop.x,rightTop.y); g.lineTo(rightBottom.x,rightBottom.y);
                g.stroke();
                g.restore();
            }

            _goalBallInNet() {
                if(this.goalTick<=0 && this.goalDelayTick<=0) return;
                const p=this._ps(this.btpx, this.btpy);
                this._ball(p.x,p.y,9);
            }

            _keeperSavePoint() {
                if(!this.keeperSave) return null;
                if(!this.shotActive || !this.shotStart) {
                    return {px:this.keeperSave.px, py:this.keeperSave.py};
                }
                const sx=this.shotStart.px, sy=this.shotStart.py;
                const tx=this.btpx, ty=this.btpy;
                const total=Math.hypot(tx-sx, ty-sy) || 1;
                const done=Math.hypot(this.bpx-sx, this.bpy-sy);
                const t=Math.max(0, Math.min(1, done/total));
